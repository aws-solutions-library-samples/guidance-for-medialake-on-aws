spec: v1.0.0
node:
  id: video_thumbnail
  title: Video Thumbnail
  description: Create a video thumbnail
  version: 1.0.0
  type: utility
  integration:
    config:
      lambda:
        handler: utility/VideoThumbnailLambdaDeployment
        runtime: python3.12
        iam_policy:
          statements:
            - effect: Allow
              actions:
                - s3:ListBucket
                - s3:GetObject
                - s3:PutObject
              resources:
                - arn:aws:s3:::${MEDIA_ASSETS_BUCKET_NAME}/*
                - arn:aws:s3:::${MEDIA_ASSETS_BUCKET_NAME}
            - effect: Allow
              actions:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:PutItem
              resources:
                - ${MEDIALAKE_ASSET_TABLE}
            - effect: Allow
              actions:
                - kms:Decrypt
              resources:
                - ${MEDIA_ASSETS_BUCKET_ARN_KMS_KEY}
            - effect: Allow
              actions:
                - kms:GenerateDataKey
              resources:
                - '*'
                
actions:
  extract:
    summary: Create a video thumbnail
    description: Create a thumbnail image from a video file stored in S3
    operationId: createVideoThumbnail
    parameters:
      - in: body
        name: output_bucket
        required: true
        schema:
          type: string
          description: S3 bucket name for output
      - in: body
        name: thumbnail_width
        required: false
        schema:
          type: integer
          description: Width of the thumbnail in pixels
          default: 300
      - in: body
        name: thumbnail_height
        required: false
        schema:
          type: integer
          description: Height of the thumbnail in pixels
          default: 400
    x-requestMapping: processor/video_thumbnail/extract/
    x-responseMapping: processor/video_thumbnail/extract/
    connections:
      incoming:
        type: [video]
      outgoing:
        type: [any]