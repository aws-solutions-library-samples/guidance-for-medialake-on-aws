spec: v1.0.0
node:
  id: audio_transcription_transcribe_summary
  title: Transcription Job Summary
  description: Get the summary of an audio transcription
  version: 1.0.0
  type: utility
  integration:
    config:
      lambda:
        handler: utility/AudioTranscriptionTranscribeSummaryLambdaDeployment
        runtime: python3.12
        iam_policy:
          statements:
            - effect: Allow
              actions:
                - bedrock:InvokeModel
              resources:
                - "*"
            - effect: Allow
              actions:
                - s3:GetObject
                - s3:PutObject
              resources:
                - arn:aws:s3:::${MEDIA_ASSETS_BUCKET_NAME}/*
                - arn:aws:s3:::${MEDIA_ASSETS_BUCKET_NAME}
            
actions:
  transcribe_summary:
    summary: Transcription Summary
    description: Summarize the audio transcription
    operationId: audioTranscriptionTranscribeSummary
    connections:
      incoming:
        type: [metadata]
      outgoing:
        type: [metadata]
