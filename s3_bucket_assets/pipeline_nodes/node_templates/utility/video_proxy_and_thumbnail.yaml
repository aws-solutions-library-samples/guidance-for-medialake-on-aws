spec: v1.0.0
node:
  id: video_proxy_and_thumbnail
  title: Video Proxy and Thumbnail
  description: Create a video proxy and thumbnail
  version: 1.0.0
  type: utility
  integration:
    config:
      lambda:
        handler: utility/VideoProxyAndThumbnailLambdaDeployment
        runtime: python3.12
        iam_policy:
          statements:
            - effect: Allow
              actions:
                - iam:PassRole
              resources:
                - ${MEDIACONVERT_ROLE_ARN}
            - effect: Allow
              actions:
                - mediaconvert:CreateJob
                - mediaconvert:ListJobs
                - mediaconvert:GetJob
              resources:
                - ${MEDIACONVERT_QUEUE_ARN}
            - effect: Allow
              actions:
                - mediaconvert:DescribeEndpoints
              resources:
                - arn:aws:mediaconvert:${AWS::Region}:${AWS::AccountId}:endpoints/*
            - effect: Allow
              actions:
                - s3:ListBucket
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              resources:
                - arn:aws:s3:::${MEDIA_ASSETS_BUCKET_NAME}/*
                - arn:aws:s3:::${MEDIA_ASSETS_BUCKET_NAME}
            - effect: Allow
              actions:
                - cloudwatch:PutMetricData
              resources:
                - "*"
            - effect: Allow
              actions:
                - kms:Decrypt
              resources:
                - ${MEDIA_ASSETS_BUCKET_ARN_KMS_KEY}
            - effect: Allow
              actions:
                - kms:GenerateDataKey
              resources:
                - "*"

actions:
  extract:
    summary: Create a video proxy and thumbnail
    description: Create a video proxy and thumbnail from a video file stored in S3
    operationId: createVideoProxyAndThumbnail
    parameters:
      - in: body
        name: MediaConvert Queue Arn
        required: true
        default: ${MEDIACONVERT_QUEUE_ARN}
        schema:
          type: string
      - in: body
        name: MediaConvert Role Arn
        required: true
        default: ${MEDIACONVERT_ROLE_ARN}
        schema:
          type: string
      - in: body
        name: output_bucket
        required: false
        default: ""
        schema:
          type: string
        description: S3 bucket for proxy and thumbnail output. Leave empty to use the default media assets bucket.
      - in: body
        name: Audio Track Selection Rules
        required: false
        default: ""
        schema:
          type: string
        description: 'JSON array of rules controlling which audio tracks are selected for the output proxy. Each rule has a ''condition'' (track count match) and ''tracks'' (1-based track numbers or "all"). Example for a customer with stereo downmix at tracks 7&8 for 8+ track files: [{"condition":{"exact":1},"tracks":[1]},{"condition":{"min":2,"max":7},"tracks":[1,2]},{"condition":{"min":8},"tracks":[7,8]}]. Leave empty to use MediaConvert default selection. See assets/docs/audio-track-selection.md for full documentation.'
    x-requestMapping: processor/video_proxy_and_thumbnail/extract/
    x-responseMapping: processor/video_proxy_and_thumbnail/extract/
    connections:
      incoming:
        type: [video]
      outgoing:
        type: [any]
