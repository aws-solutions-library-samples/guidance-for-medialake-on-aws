spec: v1.0.0
node:
  id: bedrock_content_processor
  title: Bedrock Content Processor
  description: Process content using Amazon Bedrock with customizable models and prompts
  version: 1.0.0
  type: utility
  integration:
    config:
      lambda:
        handler: utility/BedrockContentProcessorLambdaDeployment
        runtime: python3.12
        iam_policy:
          statements:
            - effect: Allow
              actions:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - bedrock:ListInferenceProfiles
                - bedrock:GetInferenceProfile
              resources:
                - "*"
            - effect: Allow
              actions:
                - s3:GetObject
                - s3:PutObject
              resources:
                - arn:aws:s3:::${MEDIA_ASSETS_BUCKET_NAME}/*
                - arn:aws:s3:::${MEDIA_ASSETS_BUCKET_NAME}
            - effect: Allow
              actions:
                - s3:GetBucketLocation
              resources:
                - "*"
            - effect: Allow
              actions:
                - dynamodb:UpdateItem
                - dynamodb:GetItem
              resources:
                - ${MEDIALAKE_ASSET_TABLE}

actions:
  process_content:
    summary: Process Content with Bedrock
    description: Process any content using Amazon Bedrock models with customizable prompts
    operationId: bedrockContentProcessor
    parameters:
      - in: body
        name: model_id
        label: Bedrock Model
        required: true
        schema:
          type: select
          options:
            [
              "amazon.nova-canvas-v1:0",
              "amazon.nova-lite-v1:0",
              "amazon.nova-premier-v1:0",
              "amazon.nova-pro-v1:0",
              "amazon.nova-reel-v1:0",
              "amazon.nova-reel-v1:1",
              "amazon.titan-image-generator-v2:0",
              "amazon.titan-image-generator-v1",
              "amazon.titan-embed-image-v1",
              "anthropic.claude-3-haiku-20240307-v1:0",
              "anthropic.claude-3-opus-20240229-v1:0",
              "anthropic.claude-3-sonnet-20240229-v1:0",
              "anthropic.claude-3-5-sonnet-20241022-v2:0",
              "anthropic.claude-3-5-sonnet-20240620-v1:0",
              "anthropic.claude-3-7-sonnet-20250219-v1:0",
              "meta.llama3-2-1b-instruct-v1:0",
              "meta.llama3-2-11b-instruct-v1:0",
              "meta.llama3-2-90b-instruct-v1:0",
              "meta.llama4-maverick-17b-instruct-v1:0",
              "meta.llama4-scout-17b-instruct-v1:0",
              "mistral.pixtral-large-2502-v1:0",
              "stability.sd3-5-large-v1:0",
              "stability.stable-image-core-v1:1",
              "stability.stable-image-ultra-v1:1",
              "twelvelabs.pegasus-1-2-v1:0",
            ]
      - in: body
        name: model_region
        label: Bedrock Model Region
        required: true
        schema:
          type: select
          options:
            [
              "us-east-1",
              "us-east-2",
              "us-west-1",
              "us-west-2",
              "af-south-1",
              "ap-east-1",
              "ap-south-2",
              "ap-southeast-3",
              "ap-southeast-5",
              "ap-southeast-4",
              "ap-south-1",
              "ap-northeast-3",
              "ap-northeast-2",
              "ap-southeast-1",
              "ap-southeast-2",
              "ap-east-2",
              "ap-southeast-7",
              "ap-northeast-1",
              "ca-central-1",
              "ca-west-1",
              "eu-central-1",
              "eu-west-1",
              "eu-west-2",
              "eu-south-1",
              "eu-west-3",
              "eu-south-2",
              "eu-north-1",
              "eu-central-2",
              "il-central-1",
              "mx-central-1",
              "me-south-1",
              "me-central-1",
              "sa-east-1",
            ]
      - in: body
        name: prompt_name
        label: Default Prompt
        required: false
        schema:
          type: select
          options:
            [
              "summary_100",
              "describe_image",
              "extract_key_points",
              "analyze_sentiment",
              "structured_recap",
            ]
      - in: body
        name: prompt_appendix
        label: Prompt Appendix
        required: false
        schema:
          type: string
      - in: body
        name: content_source
        label: Content Source
        required: true
        schema:
          type: select
          options: ["transcript", "proxy"]
    connections:
      incoming:
        type: [any]
      outgoing:
        type: [any]
