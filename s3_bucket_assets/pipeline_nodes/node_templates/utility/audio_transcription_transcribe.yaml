spec: v1.0.0
node:
  id: audio_transcription_transcribe
  title: Transcribe Audio using Amazon Transcribe
  description: Create an audio transcription using Amazon Transcribe
  version: 1.0.0
  type: utility
  integration:
    config:
      lambda:
        handler: utility/AudioTranscriptionTranscribeLambdaDeployment
        runtime: python3.12
        iam_policy:
          statements:
            - effect: Allow
              actions:
                - transcribe:StartTranscriptionJob
              resources:
                - "*"
            - effect: Allow
              actions:
                - iam:PassRole
              resources:
                - "*"
            
      service_roles:
        - name: transcribe_service_role
          service: transcribe.amazonaws.com
          policies:
            - name: s3
              statements:
                - effect: Allow
                  actions:
                    - s3:PutObject
                    - s3:ListBucket
                    - s3:GetObject
                    - s3:DeleteObject
                  resources:
                    - "*"  # This could be more specific in production
                - effect: Allow
                  actions:
                    - kms:Decrypt
                  resources:
                    - ${MEDIA_ASSETS_BUCKET_ARN_KMS_KEY}
            
actions:
  transcribe:
    summary: Transcribe Audio using Amazon Transcribe
    description: Create an audio transcription using Amazon Transcribe
    operationId: audioTranscriptionTranscribe
    connections:
      incoming:
        type: [audio, video]
      outgoing:
        type: [metadata]
