spec: v1.0.0
node:
  id: trigger_image_processing_completed
  title: Image Processing Completed
  description: Wait for a specific duration
  version: 1.0.0
  type: trigger
  integration:
    config:
      aws_eventbridge:
        aws_eventbridge_rule: image_processing_completed
actions:
  trigger:
    summary: Trigger after image processing is completed
    description: This step will trigger after image processing is completed
    operationId: triggerImageProcessingCompleted
    parameters:
      - in: body
        name: Image Type
        required: true
        schema:
          type: string
    connections:
      incoming:
        type: [any]
      outgoing:
        type: [image]
