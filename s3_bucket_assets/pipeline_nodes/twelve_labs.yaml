openapi: 3.0.0
x-medialake-nodeId: pa1
x-node-type: api
info:
    title: Twelve Labs API
    version: 1.3
    description: Twelve Labs API for video, image, and audio understanding and multimodal embeddings
security:
  - apiKey: []

tags:
  - name: Video Understanding
  - name: Embeddings

servers:
  - url: https://api.twelvelabs.io/v1.3
    description: Production API Server
    x-server-environment: Production

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
  headers:
    Content-Type:
      description: content type 
      schema: string
    accept:
      description: content type 
      schema: string
      
paths:
  /embed/tasks:
    post:
      summary: Generate embeddings for videos
      operationId: generateVideoEmbeddings
      x-inputMapping: twelve_labs/embed/tasks/post/input
      x-outputMapping: twelve_labs/embed/tasks/post/output
  /embed/tasks/task_id/status:
    get:
      summary: Get the status of a video embedding task
      operationId: getEmbeddingTaskStatus
      x-inputMapping: twelve_labs/embed/tasks/task_id/status/get/input
      x-outputMapping: twelve_labs/embed/tasks/task_id/status/get/output
  /embed/tasks/task_id:
    get:
      summary: Get the results of a video embedding task
      operationId: getEmbeddingTaskResults
      x-inputMapping: twelve_labs/embed/tasks/task_id/get/input
      x-outputMapping: twelve_labs/embed/tasks/task_id/get/output
