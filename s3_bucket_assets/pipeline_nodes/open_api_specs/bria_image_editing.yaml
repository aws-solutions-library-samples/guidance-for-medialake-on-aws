openapi: 3.0.0
info:
  title: Overview
  version: ''
  description: >
    Bria's Image Editing API equips builders with a comprehensive suite of tools
    for manipulating and enhancing images.


    The API provides advanced capabilities including background operations
    (removal, replacement, blur), content manipulation (eraser, generative
    fill), image transformation (expansion, resolution increase), automatic
    cropping, person modification and automatic mask generation.  


    **Advanced Customization and Access:**  

    As part of Bria’s **Source Code & Weights** product, developers seeking
    deeper customization can access Bria’s source-available GenAI models via
    [Hugging Face](https://huggingface.co/briaai).  

    This allows full control over fine-tuning, pipeline creation, and
    integration into proprietary workflows—empowering AI teams to develop and
    optimize their own generative AI solutions.
externalDocs:
  description: Register and get API Access
  url: https://platform.bria.ai/console/account/api-keys
servers:
  - url: https://engine.prod.bria-api.com/v1
paths:
  /eraser:
    post:
      summary: Eraser
      tags:
        - Endpoints
      description: >-

        **Description**


        The *Eraser Route* enables the removal of elements or specific areas
        from a given image.


        You can define the area to be removed by providing a mask that outlines
        the region to be erased. There are two main ways recommended to generate
        these masks:

        1. Masks can be created by allowing users to draw directly on the image
        with a brush, for example. To access the SDK that demonstrates how to
        implement a brush feature in your interface, please refer to the
        following <a
        href="https://github.com/Bria-AI/js-api-sdk/blob/main/manual_brush_ui"
        target="_blank">link</a>.

        2. By using the `/objects/mask_generator` route, which will generate all
        the possible masks for an image.


        This API endpoint supports content moderation via an optional parameter
        that can prevent processing if input images contain inappropriate
        content or if the modified output would contain inappropriate content.
      operationId: eraser
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image_url:
                  type: string
                  description: >-
                    The URL of the input image. If both image_url and image_file
                    are provided, image_url will be used. Accepted formats are
                    jpeg, jpg, png, webp.
                file:
                  type: string
                  description: >-
                    The file of the input image, in base64 format. Used if
                    image_url is not provided. Accepted formats are jpeg, jpg,
                    png, webp.
                mask_url:
                  type: string
                  description: >-
                    The URL of the binary mask image that represents the area
                    that will be cleaned. If both mask_url and mask_file are
                    provided, mask_url will be used. Accepted formats - jpeg,
                    jpg, png, webp. The area to be removed should have the value
                    255 (white), while the rest of the image should have the
                    value 0 (black). **Note:** The input image and mask must
                    have the same aspect ratio.
                mask_file:
                  type: string
                  description: >-
                    The file of the binary mask image that represents the area
                    that will be cleaned, in base64 format. This parameter is
                    used if mask_url is not provided. Accepted formats - jpeg,
                    jpg, png, webp. The area to be removed should have the value
                    255 (white), while the rest of the image should have the
                    value 0 (black). **Note:** The input image and mask must
                    have the same aspect ratio.
                mask_type:
                  type: string
                  default: manual
                  description: >-
                    You can use this parameter to specify the type of the input
                    mask from the list. 'manual' opttion should be used in cases
                    in which the mask had been generated by a user (e.g. with a
                    brush tool), and 'automatic' mask type should be used when
                    mask had been generated by an algorithm like 'SAM'.
                  enum:
                    - manual
                    - automatic
                content_moderation:
                  type: boolean
                  default: false
                  description: >
                    When enabled, applies content moderation to both input
                    visuals and modified outputs.


                    For input images:

                    - Processing stops if the image fails moderation

                    - Returns a 422 error with details about which parameter
                    failed


                    For output images:

                    - If the modified image fails moderation, returns a 422
                    error
            examples:
              send using url:
                value:
                  image_url: URL
                  mask_url: URL
              send using base64 string:
                value:
                  file: base64_encoded_string_for_image
                  mask_file: base64_encoded_string_for_image
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result_url:
                    type: string
                    description: >-
                      URL that represents the updated visual created in the
                      request. It is a temporary URL that will expire
                    example: URL
        '400':
          description: Bad request. Missing or invalid parameters.
        '401':
          description: Unauthorized. Invalid API key or authentication token.
        '404':
          description: Not found. Image could not be found at the provided URL.
        '413':
          description: Payload too large. Image file size exceeds the 12MB limit.
        '415':
          description: >-
            Unsupported media type. Invalid file type. Supported file types are
            jpeg, jpg, png, webp.
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                type: string
              examples:
                input_violation:
                  value: >-
                    The request could not be completed because the visual in the
                    '{parameter_name}' parameter did not pass content
                    moderation.
                output_violation:
                  value: >-
                    The request could not be completed because the modified
                    visual did not pass content moderation.
        '429':
          description: >-
            Request limit exceeded. Your account has reached its maximum allowed
            requests. Please upgrade your plan or try again later.
        '460':
          description: Failed to download image.
        '500':
          description: Internal server error. An error occurred on the server.
  /gen_fill:
    post:
      summary: Generative Fill
      tags:
        - Endpoints
      description: >-

        **Description**


        The *GenFill Route* enables the generation of objects by prompt in a
        specific region of an image.


        You can define the area for object generation by using a mask that
        outlines the region where the object will be created. Our model is
        optimized to work seamlessly with blob-shaped masks.


        Masks can be created by allowing users to draw directly on the image
        with a brush, for example. To access the SDK that demonstrates how to
        implement a brush feature in your interface, please refer to the
        following <a
        href="https://github.com/Bria-AI/js-api-sdk/blob/main/manual_brush_ui"
        target="_blank">link</a>.


        This API endpoint supports content moderation via an optional parameter
        that can prevent processing if input images contain inappropriate
        content and filters out unsafe generated images - the first blocked
        input image will fail the entire request.
      operationId: gen-fill
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image_url:
                  type: string
                  description: >-
                    The URL of the input image. If both image_url and image_file
                    are provided, image_url will be used. Accepted formats are
                    jpeg, jpg, png, webp.
                file:
                  type: string
                  description: >-
                    The file of the input image, in base64 format. Used if
                    image_url is not provided. Accepted formats are jpeg, jpg,
                    png, webp.
                mask_url:
                  type: string
                  description: >-
                    The URL of the binary mask image that represents the area in
                    which the object will be generated. If both mask_url and
                    mask_file are provided, mask_url will be used. Accepted
                    formats are jpeg, jpg, png, webp. The area in which the
                    object will be generated should have the value 255 (white),
                    while the rest of the image should have the value 0 (black).
                    **Note:** The input image and mask must have the same aspect
                    ratio.
                mask_file:
                  type: string
                  description: >-
                    The file of the binary mask image that represents the area
                    in which the object will be generated, in base64 format.
                    This parameter is used if mask_url is not provided. Accepted
                    formats are jpeg, jpg, png, webp. The area in which the
                    object will be generated should have the value 255 (white),
                    while the rest of the image should have the value 0 (black).
                    **Note:** The input image and mask must have the same aspect
                    ratio.
                mask_type:
                  type: string
                  default: manual
                  description: >-
                    You can use this parameter to specify the type of the input
                    mask from the list. 'manual' opttion should be used in cases
                    in which the mask had been generated by a user (e.g. with a
                    brush tool), and 'automatic' mask type should be used when
                    mask had been generated by an algorithm like 'SAM'.
                  enum:
                    - manual
                    - automatic
                prompt:
                  type: string
                  description: >-
                    The prompt you would like to use to generate the object
                    within the masked region.
                negative_prompt:
                  type: string
                  description: >-
                    The prompt you would like to use to specify details or
                    attributes to avoid in the object generated within the
                    masked region.
                num_results:
                  type: integer
                  description: The number of images you would like to generate.
                  minimum: 1
                  default: 4
                  maximum: 4
                sync:
                  type: boolean
                  default: false
                  description: >-
                    Determines the response mode. When true, responses are
                    synchronous. With false, responses are asynchronous,
                    immediately providing URLs for images that are generated in
                    the background. It is recommended to use sync=false for
                    optimal performance. When generating more than 1 result, you
                    should use the value false.
                seed:
                  type: integer
                  description: >-
                    You can choose whether you want your generated results to be
                    random or predictable. You can recreate the same result in
                    the future by using the seed value of a result from the
                    response. You can exclude this parameter if you are not
                    interested in recreating your results. This parameter is
                    optional.
                content_moderation:
                  type: boolean
                  default: false
                  description: >
                    When enabled, applies content moderation to both input
                    visuals and generated outputs.


                    For input images:

                    - Processing stops if the image fails moderation

                    - Returns a 422 error with details about which parameter
                    failed


                    For synchronous requests (sync=true):

                    - If some images pass and others fail, returns a 200
                    response with URLs array containing successful generations
                    and "422_image_blocked_due_to_content_moderation" for failed
                    ones
                            examples:
                              send using url:
                                value:
                                  image_url: 'URL'
                                  mask_url: 'URL'
                                  prompt: 'object description'
                              send using base64 string:
                                value:
                                  file: 'base64_encoded_string_for_image'
                                  mask_file: 'base64_encoded_string_for_image'
                                  prompt: 'object description'
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  urls:
                    type: array
                    items:
                      type: string
                    description: >
                      An array of URLs representing the updated visuals
                      generated by the request. 

                      These URLs are temporary and will eventually expire.


                      When content_moderation is true:

                      - For synchronous requests (sync=true): Array will contain
                      URLs for successful generations and
                      "422_image_blocked_due_to_content_moderation" for images
                      that failed moderation

                      - For asynchronous requests (sync=false): Failed images
                      will be replaced with zero-byte files at their placeholder
                      URLs
                  seed:
                    type: array
                    items:
                      type:
                        - integer
                        - 'null'
                    description: >
                      An array of integers representing the seeds used to
                      generate each result. 

                      These seeds ensure reproducibility and are compatible with
                      the results URL structure.

                      When content moderation blocks an image, its corresponding
                      seed will be null.
              examples:
                success:
                  value:
                    urls:
                      - https://server.com/result1.jpg
                      - https://server.com/result2.jpg
                    seed:
                      - 12345
                      - 98765
                partial_success:
                  value:
                    urls:
                      - https://server.com/result_pass1.jpg
                      - 422_image_blocked_due_to_content_moderation
                    seed:
                      - 12345
                      - null
        '400':
          description: Bad request. Missing or invalid parameters.
        '401':
          description: Unauthorized. Invalid API key or authentication token.
        '404':
          description: Not found. Image could not be found at the provided URL.
        '413':
          description: Payload too large. Image file size exceeds the 12MB limit.
        '415':
          description: >-
            Unsupported media type. Invalid file type. Supported file types are
            jpeg, jpg, png, webp.
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                type: string
              examples:
                input_violation:
                  value: >-
                    The request could not be completed because the visual in the
                    '{parameter_name}' parameter failed content moderation.
                all_outputs_blocked:
                  value: >-
                    The request could not be completed because all modified
                    visuals failed content moderation.
        '429':
          description: >-
            Request limit exceeded. Your account has reached its maximum allowed
            requests. Please upgrade your plan or try again later.
        '460':
          description: Failed to download image.
        '500':
          description: Internal server error. An error occurred on the server.
  /background/remove:
    post:
      summary: Remove Background
      tags:
        - Endpoints
      description: >-

        **Description**


        The *Remove BG* Route can be used to remove the background of an image.
        This route leverages Bria's newest model, RMBG 2.0. For more details and
        to explore the model, check out the [Hugging Face
        demo](https://huggingface.co/spaces/briaai/BRIA-RMBG-2.0).


        This API endpoint supports content moderation via an optional parameter
        that can prevent processing if input images contain inappropriate
        content or if the modified output would contain inappropriate content.



        **Constraints**


        The Bria API currently supports only JPEG and PNG files in RGB, RGBA, or
        CMYK color modes. When the file is of a different type or color mode,
        the status code 415 will be returned.


        **Remove the background from an image using the image file**


          In our documentation request example, we demonstrate how to remove the background from an image using the image URL.
          
          
          If you want to use an image from a file, follow the example below:


              import requests

              url = "https://engine.prod.bria-api.com/v1/background/remove"

              payload = {}
              files=[
                ('file',('image_name.jpeg',open('/path_to_local_file/image_name.jpeg','rb'),'image/jpeg'))
              ]
              headers = {
                'api_token': 'xxxx'
              }

              response = requests.request("POST", url, headers=headers, data=payload, files=files)

              print(response.text)
      operationId: background-remove
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: The image file you would like to remove the background from.
                  type: string
                  format: binary
                image_url:
                  description: >-
                    The URL of the image file you would like to remove the
                    background from. The URL should lead to an image publicly
                    available online. Either a file or an image_url should be
                    provided. If both are provided, then the route will use
                    image_url.
                  type: string
                content_moderation:
                  type: boolean
                  default: false
                  description: >
                    When enabled, applies content moderation to both input
                    visuals and modified outputs.


                    For input images:

                    - Processing stops if the image fails moderation

                    - Returns a 422 error with details about which parameter
                    failed


                    For output images:

                    - If the modified image fails moderation, returns a 422
                    error
            example:
              image_url: >-
                https://i.natgeofe.com/n/548467d8-c5f1-4551-9f58-6817a8d2c45e/NationalGeographic_2572187_square.jpg
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result_url:
                    type: string
                    description: >-
                      URL that represents the updated visual created in the
                      request. It is a temporary URL that will expire.
        '206':
          description: File value was not provided.
        '400':
          description: Request doesn't contain file part.
        '405':
          description: Method not allowed.
        '415':
          description: Unsupported media type.
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                type: string
              examples:
                input_violation:
                  value: >-
                    The request could not be completed because the visual in the
                    '{parameter_name}' parameter did not pass content
                    moderation.
                output_violation:
                  value: >-
                    The request could not be completed because the modified
                    visual did not pass content moderation.
        '429':
          description: >-
            Request limit exceeded. Your account has reached its maximum allowed
            requests. Please upgrade your plan or try again later.
        '460':
          description: Failed to download image.
        '500':
          description: Internal server error.
        '506':
          description: Insufficient data. The given input is not supported by the Bria API.
  /background/replace:
    post:
      summary: Generate Background
      tags:
        - Endpoints
      description: "\n\n**Description**\n\n\nThe\_*Replace BG Route*\_is used to replace the background of any image.\nWe offer a fast version of this feature, powered by Bria 2.3 Fast LoRA (<a href=\"https://huggingface.co/briaai/BRIA-2.3-FAST-LORA\" target=\"_blank\">model card on Hugging Face</a>), which provides an optimal balance between speed and quality.\nThis endpoint also supports solid colors - you can take a color code and use it in the prompt.        \nHere are some examples:\n\n**original image**: \n\n<img src=\"https://i.ibb.co/n6JtktM/unnamed-13.jpg\" width=\"200\"/>\n\n**bg_prompt**: in a parking lot\n        \n\n**num_results**: 3\n\n**results**:\n\n<img src=\"https://i.ibb.co/1zvT5h4/unnamed-14.jpg\" width=\"200\"/> <img src=\"https://i.ibb.co/MkVDxc8/unnamed-15.jpg\" width=\"200\"/> <img src=\"https://i.ibb.co/pfgQ34p/unnamed-16.jpg\" width=\"200\"/> \nThis API endpoint supports content moderation via an optional parameter that can prevent processing if input images contain inappropriate content, and filters out unsafe modified images - the first blocked input image will fail the entire request."
      operationId: background-replace
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
          description: API token associated with the organization.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sync:
                  type: boolean
                  default: false
                  description: >-
                    Determines the response mode. When true, responses are
                    synchronous. With false, responses are asynchronous,
                    immediately providing URLs for images that are generated in
                    the background. It is recommended to use sync=false for
                    optimal performance. When generating more than 1 result, you
                    should use the value false.
                fast:
                  type: boolean
                  default: true
                  description: >-
                    Determines the generation mode. When true, the generation
                    will utilize the fast mode which provides the best balance
                    between speed and quality. When false, the regular mode will
                    be utilized.
                image_url:
                  type: string
                  description: >-
                    The URL of the image to which a new background should be
                    generated. If both image_url and image_file are provided,
                    image_url will be used. Accepted formats are jpeg, jpg, png,
                    webp. Maximum file size 12MB.
                file:
                  type: string
                  description: >-
                    The product of the image to which a new background should be
                    generated, in base64 format. Used if image_url is not
                    provided. Accepted formats are jpeg, jpg, png, webp. Maximum
                    file size 12MB.
                ref_image_url:
                  type: string
                  description: >-
                    The URL of the reference image to be used for generating the
                    new background. Either ref_image_url or bg_prompt has to be
                    provided but not both. If both ref_image_url and
                    ref_image_file are provided, ref_image_url will be used.
                    Accepted formats are jpeg, jpg, png, webp.
                ref_image_file:
                  type: string
                  description: >-
                    The reference image file to be used for generating the new
                    background. If both ref_image_url and ref_image_file are
                    provided, ref_image_url will be used. Accepted formats are
                    jpeg, jpg, png, webp.
                bg_prompt:
                  type: string
                  description: >-
                    Text description of the new scene or background for the
                    provided image. Either ref_image_url or bg_prompt has to be
                    provided but not both. Bria currently supports prompts in
                    English only, excluding special characters.
                refine_prompt:
                  type: boolean
                  default: true
                  description: >-
                    When true, an additional logic takes the bg_prompt that was
                    included and adjusts it to achieve optimal results. Built
                    with Meta Llama 3.
                enhance_ref_image:
                  type: boolean
                  default: true
                  description: >-
                    When set to true, additional logic processes the included
                    reference image to make adjustments for optimal results.
                original_quality:
                  type: boolean
                  default: false
                  description: >-
                    When true, the output image retains the original input
                    image's size; otherwise, the image is scaled to 1 megapixel
                    (1MP) while preserving its aspect ratio.
                num_results:
                  type: integer
                  default: 4
                  description: The number of results you would like to generate.
                force_rmbg:
                  type: boolean
                  default: false
                  description: >-
                    Forces background removal, even if the original image
                    already contains an alpha channel. Useful for refining
                    existing foreground/background separation or ignoring
                    unnecessary alpha channels.
                content_moderation:
                  type: boolean
                  default: false
                  description: >
                    When enabled, applies content moderation to both input
                    visuals and modified outputs.


                    For input images:

                    - Processing stops at the first image that fails moderation

                    - Returns a 422 error with details about which parameter
                    failed


                    For synchronous requests (sync=true):

                    - If all modified images fail moderation, returns a 422
                    error

                    - If some images pass and others fail, returns a 200
                    response with successful outputs and "blocked" objects for
                    failed ones


                    For asynchronous requests (sync=false):

                    - Failed images are replaced with zero-byte files at their
                    placeholder URLs

                    - Successful images are stored at their original placeholder
                    URLs  
                negative_prompt:
                  type: string
                  description: >-
                    Elements or features that should be excluded from the
                    generated scene. This parameter is optional and is available
                    only when fast=false. Bria currently supports descriptions
                    in English only.
                seed:
                  type: integer
                  description: >-
                    You can choose whether you want your generated results to be
                    random or predictable. You can recreate the same result in
                    the future by using the seed value of a result from the
                    response. You can exclude this parameter if you are not
                    interested in recreating your results. This parameter is
                    optional.
            example:
              bg_prompt: in a living room interior, on a kitchen counter
              num_results: 2
              sync: true
              image_url: URL
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    description: >
                      The array contains the results created in the request. In
                      each result, the first value represents the URL of the
                      result, the second value represents the seed, and the
                      third value represents the session id of the result. It
                      will take a few seconds for the image to become available
                      via the URL if sync=false. You can recreate the same
                      result in the future by using the seed as part of the
                      request.


                      When content_moderation is true:

                      - For synchronous requests (sync=true): Results array will
                      contain both successful generations and "blocked" objects
                      for images that failed moderation

                      - For asynchronous requests (sync=false): Failed images
                      will be replaced with zero-byte files at their placeholder
                      URLs
                    items:
                      type: array
                      items:
                        type: string
              examples:
                success:
                  value:
                    result:
                      - - https://storage.server/outputs/valid_output_1.jpeg
                        - '123111'
                        - valid_output_1.jpeg
                      - - https://storage.server/outputs/valid_output_2.jpeg
                        - '123222'
                        - valid_output_2.jpeg
                partial_success:
                  value:
                    result:
                      - - https://storage.server/outputs/valid_output_1.jpeg
                        - '123111'
                        - valid_output_1.jpeg
                      - - blocked:true
                        - error_code:422
                        - >-
                          description:The request could not be completed because
                          the modified visual did not pass content moderation.
        '400':
          description: Bad request. Missing or invalid parameters.
        '401':
          description: Unauthorized. Invalid API key or authentication token.
        '404':
          description: Not found. Image could not be found at the provided URL.
        '413':
          description: Payload too large. Image file size exceeds the 12MB limit.
        '415':
          description: >-
            Unsupported media type. Invalid file type. Supported file types are
            jpeg, jpg, png, webp.
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                type: string
              examples:
                input_violation:
                  value: >-
                    The request could not be completed because the visual in the
                    '{parameter_name}' parameter did not pass content
                    moderation.
                all_outputs_blocked:
                  value: >-
                    The request could not be completed because all modified
                    visuals failed content moderation.
        '429':
          description: >-
            Request limit exceeded. Your account has reached its maximum allowed
            requests. Please upgrade your plan or try again later.
        '460':
          description: Failed to download image.
        '500':
          description: Internal server error. An error occurred on the server.
  /erase_foreground:
    post:
      summary: Erase Foreground
      tags:
        - Endpoints
      description: >-


        **Description**



        This route is used to erase the foreground from a provided image, while
        generating the area behind it. 

        This API endpoint supports content moderation via an optional parameter
        that can prevent processing if input images contain inappropriate
        content or if the modified output would contain inappropriate content.
      operationId: erase-foreground
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image_url:
                  type: string
                  description: >-
                    The URL of the input image. If both image_url and image_file
                    are provided, image_url will be used. Accepted formats are
                    jpeg, jpg, png, webp. Maximum file size 12MB.
                file:
                  type: string
                  description: >-
