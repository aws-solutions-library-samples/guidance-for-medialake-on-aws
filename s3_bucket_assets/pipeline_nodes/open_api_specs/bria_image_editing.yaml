  /{visual_id}/person/info:
    get:
      summary: Get Presenter info
      tags:
        - Endpoints
      description: >-



        **Description**


        ***Note: This API route requires the image to be registered via the
        `/register` route.***


        The *Person/Info Route* is used to retrieve useful information on the
        people in a specific visual that was previously uploaded to the
        database.


        Additionally, it provides a description of each person within the scene 
        along with its available changes, which are supported by the Bria API. 


        This route should be used instead of the main /info route when you are
        only interested in  information and available actions for the people in
        the image.  With this route, you will save time by only obtaining
        information that is relevant to your needs.
      operationId: person-info
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
        - in: path
          name: visual_id
          required: true
          schema:
            type: string
          example: f49943971e3039c7
          description: >-
            visual id of the image, received after using the /upload or register
            route.
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    actions:
                      type: object
                      description: The available API actions for this specific person.
                    id:
                      type: string
                      description: The id of the person
                    labels:
                      type: array
                      description: >-
                        The known information about the person, such as age
                        range and gender
                    oracle:
                      type: object
                      description: >-
                        The predicted quality of the available actions for this
                        specific person
                    rect:
                      type: object
                      description: >-
                        The location of the face inside the image. x and y
                        represent the upper left corner of the face, and by
                        using the w (width) and h (height) you can create a
                        rectangle around the face.
