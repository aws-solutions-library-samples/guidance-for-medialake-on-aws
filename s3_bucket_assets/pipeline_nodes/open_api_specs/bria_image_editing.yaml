  /objects/mask_generator:
    post:
      summary: Get Masks
      tags:
        - Endpoints
      description: >-



        **Description**


        ***Note: This API route requires the image to be registered via the
        `/register` route.***


        The *Objects/Mask Generator Route* is used to generate all possible
        masks for an image, creating a full segmentation of the image.


        The response contains a zip file named as the visual_id of the provided
        image.


        There are k mask files in the zip, each named with the visual_id and
        mask_id.


        The zip file contains an additional file whose name ends with
        "panoptic". It's not an image, it's a panoptic map. It can be
        transformed into a regular matrix.


        Each point in the image (x,y) is mapped to the mask that applies to that
        point. In the panoptic map, each pixel's grayscale value includes the
        mask_id. 


        You can display those masks to the user, let them pick one or more
        masks, and use objects/remove route to remove the masked area.


        In order to use the objects/remove route on the mask the user selected,
        you should provide the mask_id, and use the parameter
        mask_source=generated.


        You can see below an example of the content of the zip:


              92bf8ce17584de82_panoptic.png

              
              92bf8ce17584de82_1.png

              
              92bf8ce17584de82_2.png

              
              92bf8ce17584de82_3.png

              
              ...

              
              92bf8ce17584de82_86.png


        You can access the SDK that demonstrates how to use this endpoint in a
        UI in the following <a
        href="https://github.com/Bria-AI/js-api-sdk/blob/50a062867092788aaa9612f2cc69f7692567115a/mask_hover_ui"
        target="_blank">link</a>.

        This API endpoint supports content moderation via an optional parameter
        that can prevent processing if input images contain inappropriate
        content - the first blocked input image will fail the entire request.
      operationId: objects-mask-generator
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image_url:
                  type: string
                  description: >-
                    The URL of the input image. If both image_url and image_file
                    are provided, image_url will be used. Accepted formats are
                    jpeg, jpg, png, webp. Maximum file size 12MB.
                file:
                  type: string
                  description: >-
                    The file of the input image, in base64 format. Used if
                    image_url is not provided. Accepted formats are jpeg, jpg,
                    png, webp. Maximum file size 12MB.
                content_moderation:
                  type: boolean
                  default: false
                  description: >
                    When enabled, applies content moderation to input visuals.


                    For input images:

                    - Processing stops at the first image that fails moderation

                    - Returns a 422 error with details about which parameter
                    failed
            examples:
              send using url:
                value:
                  image_url: URL
              send using base64 string:
                value:
                  file: base64_encoded_string_for_image
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects_masks:
                    type: string
                    example: >-
        '400':
          description: Bad request.
        '405':
          description: Method not allowed.
        '422':
          description: Unprocessable Entity.
          content:
            application/json:
              schema:
                type: string
              examples:
                input_violation:
                  value: >-
                    The request could not be completed because the visual in the
                    '{parameter_name}' parameter did not pass content
                    moderation.
                invalid_image:
