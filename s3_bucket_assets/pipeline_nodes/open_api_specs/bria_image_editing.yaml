  /{visual_id}/create:
    post:
      summary: Modify Presenter
      tags:
        - Endpoints
      description: >-


        **Description**


        ***Note: This API route requires the image to be registered via the
        `/register` route.***


        The *Create Route* is used to create a new visual, based on the changes
        requested by the user for a previously uploaded visual.


        You can also use this route on a modified image by providing the sid
        from the response of the previously used route.


        This route returns both the URL and the sid associated with the updated
        image.


        Before making any modifications, please call the /info or person/info
        route to obtain information on the available presenters in the image,
        the available modifications, and their oracle values.


        You should always include all the required changes in the request if you
        want to use multiple changes on a single person. It is not supported to
        make one request on a person with one change, take the SId from the
        result, and then use it in another request with a different change.


        When you want to make changes on multiple people, you can make one
        request with all the desired changes on all the relevant people or make
        one request with all the desired changes on one person and then use the
        sid from the response in the request on the other person. 
      operationId: create
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
        - in: path
          name: visual_id
          required: true
          schema:
            type: string
          example: 8487fb411f3c6716
          description: visual id of the image the user wants to create a new visual from.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sid:
                  type: string
                  description: >-
                    This session id was obtained from the response of a route
                    that had been applied to this visual id. If you have used
                    another route on the provided visual before, and you would
                    like the current route to modify the result of that route,
                    please provide this information. This parameter is optional.
                desired_resolution:
                  type: string
                  description: >-
                    The desired resolution of the updated image. This parameter
                    is optional.
                  enum:
                    - original
                    - nhd
                    - svga
                    - xga
                    - had
                    - wuxga
                    - uwfhd
                    - wqxga
                    - uwqhd
                    - uhd
                changes:
                  type: array
                  description: The requested changes to the original visual.
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: >-
                          Id of the selected object in the image, to which the
                          user would like to make changes.
                      actions:
                        type: object
                        description: >-
                          The changes the user wishes to perform for this object
                          in the image. Each action the user chooses to use must
                          be included in the info route response for this object
                          and image. This is essential for the /create request
                          to be successful.
                        properties:
                          age:
                            type: string
                            enum:
                              - mid-20
                              - mid-40
                              - mid-60
                            description: >-
                              Changing the age of a selected person. It is
                              possible to use one of the enum values or to
                              provide a value between -10 and 10. Decimal values
                              are acceptable.
                          diversity:
                            type: string
                            enum:
                              - africa
                              - korea
                              - india
                              - japan
                              - sweden
                              - germany
                              - russia
                              - mexico
                              - brazil
                              - england
                              - spain
                              - france
                            description: >-
                              Changing the diversity of a selected person. It is
                              possible to use one of the enum values or to
                              provide in addition to the enum a value between 0
                              and 1.
                          expression:
                            type: string
                            enum:
                              - happy
                              - surprised
                              - dreaming
                              - angry
                              - fear
                              - contempt
                              - disgusted
                              - sad
                            description: >-
                              Changing the expression of a selected person. It
                              is possible to use one of the enum values or to
                              provide in addition to the enum a value between 0
                              and 1.5.
                          glasses:
                            type: string
                            enum:
                              - light
                              - heavy
                              - none
                            description: >-
                              Changing the glasses of a selected person. It is
                              possible to use one of the enum values or to
                              provide a value between 0 and 6. Only integer
                              values are acceptable.
                          haircolor:
                            type: string
                            enum:
                              - black
                              - brown
                              - red
                              - blond
                              - gray
                            description: >-
                              Changing the hair color of a selected person. It
                              is possible to use one of the enum values or to
                              provide a value between 0 and 4. Only integer
                              values are acceptable.
                          gender:
                            type: string
                            enum:
                              - femininity
                              - masculinity
                            description: >-
                              Changing the gender of a selected person. It is
                              possible to use one of the enum values or to
                              provide a value between -10 and 10. Decimal values
                              are acceptable.
                          makeup:
                            type: string
                            enum:
                              - light
                              - heavy
                              - none
                            description: >-
                              Changing the makeup of a selected person. It is
                              possible to use one of the enum values or to
                              provide a value between -10 and 10. Decimal values
                              are acceptable.
                          hair_line:
                            type: string
                            enum:
                              - high
                              - low
                            description: >-
                              Changing the hair line of a selected person. It is
                              possible to use one of the enum values or to
                              provide a value between -20 and 20. Decimal values
                              are acceptable.
                          Beard:
                            type: string
                            enum:
                              - shaved
                              - medium
                              - full
                            description: >-
                              Changing the facial hair of a selected person. It
                              is possible to use one of the enum values or to
                              provide a value between -2 and 2. Decimal values
                              are acceptable.
            examples:
              Using enum values:
                value:
                  changes:
                    - id: >-
                        c6bbe1cd719300c11e5c581889e9383245a0c1d923f210a3445e8ea5a25500e0
                      actions:
                        age: mid-60
                        diversity: france
                        expression: happy
              Using continuous numeric values:
                value:
                  changes:
                    - id: >-
                        c6bbe1cd719300c11e5c581889e9383245a0c1d923f210a3445e8ea5a25500e0
                      actions:
                        age:
                          key: age
                          value: 6.2
                        diversity:
                          key: france
                          value: 0.8
                        expression:
                          key: happy
                          value: 0.6
              Using enum values and continuous numeric values:
                value:
                  changes:
                    - id: >-
                        c6bbe1cd719300c11e5c581889e9383245a0c1d923f210a3445e8ea5a25500e0
                      actions:
                        age:
                          key: age
                          value: 6.2
                        diversity: france
                        expression:
                          key: happy
                          value: 0.6
              Multiple People:
                value:
                  changes:
                    - id: person_1
                      actions:
                        age:
                          key: age
                          value: 6.2
                        diversity: france
                        expression:
                          key: happy
                          value: 0.6
                    - id: person_1
                      actions:
                        age:
                          key: age
                          value: 6.2
                        diversity: france
                        expression:
                          key: happy
                          value: 0.6
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  image_res:
                    type: string
                    description: >-
                      URL that represents the new visual created in the request.
                      It is a temporary URL that will expire
                  sid:
                    type: string
                    example: aaeec35e-9904-21ed-a479-964fdf514767.JPEG
                    description: >-
                      This session id represents the result of the current route
                      request. If you wish to use this result in other routes,
                      please provide this sid in their input.
        '400':
          description: Bad request.
        '404':
          description: Specified Image does not exist.
        '405':
          description: Method not allowed.
        '429':
          description: >-
            Request limit exceeded. Your account has reached its maximum allowed
            requests. Please upgrade your plan or try again later.
        '500':
          description: Internal server error.
        '506':
          description: Insufficient data. The given input is not supported by the Bria API.
