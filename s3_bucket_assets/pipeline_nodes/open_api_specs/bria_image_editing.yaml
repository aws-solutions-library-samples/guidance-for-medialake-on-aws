  /image_expansion:
    post:
      summary: Expand Image
      tags:
        - Endpoints
      description: "\n\n**Description**\n\n\nThe\_*Image Expension Route*\_can be used to expand an image, by utilizing generative AI.\n\nYou can decide on the image size of the final result as well as the position and size of the original image compared to the final result.\n\nIn this way, you can create unique variations of your original image instead of cropping it into different aspect ratios and losing important details.\n\n**Optimal input range**\n\n***Input Image Area:*** Ensure that the ratio of the input image foreground or main subject to the canvas area is greater than 15% to achieve optimal results.\n\n***Canvas Size:*** The canvas size should be up to an area of 5000x5000 pixels.\nHere are some examples:\n\n**original image (Generated by Bria)**: \n\n<img src=\"https://bria-image-repository.s3.amazonaws.com/images/caeaa19524d69ad6.jpg\" width=\"200\"/>\n\n**results**:\n\n<img src=\"https://bria-image-repository.s3.amazonaws.com/images/d4d49719b5a54e49.jpg\" width=\"400\"/> <img src=\"https://bria-image-repository.s3.amazonaws.com/images/cbf61f2b859662c0.jpg\" width=\"200\"/> <img src=\"https://bria-image-repository.s3.amazonaws.com/images/aa9b3036e5c6d43a.jpg\" width=\"600\"/> \n\n\n **original image (Stock Image)**: \n\n\n<img src=\"https://bria-image-repository.s3.amazonaws.com/images/c64220ebda5ce787.jpg\" width=\"200\"/>\n\n**results**:\n\n<img src=\"https://bria-image-repository.s3.amazonaws.com/images/d35530e95ab7c509.jpg\" width=\"400\"/> <img src=\"https://bria-image-repository.s3.amazonaws.com/images/84752d2fca8a6ae3.jpg\" width=\"200\"/> <img src=\"https://bria-image-repository.s3.amazonaws.com/images/904f62b0dce4fb8c.jpg\" width=\"600\"/> \n\nThis API endpoint supports content moderation via an optional parameter that can prevent processing if input images contain inappropriate content or if the expanded output would contain inappropriate content."
      operationId: image-expansion
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image_url:
                  type: string
                  description: >-
                    The URL of the input image. If both image_url and image_file
                    are provided, image_url will be used. Accepted formats are
                    jpeg, jpg, png, webp. Maximum file size 12MB.
                file:
                  type: string
                  description: >-
                    The file of the input image, in base64 format. Used if
                    image_url is not provided. Accepted formats are jpeg, jpg,
                    png, webp. Maximum file size 12MB.
                canvas_size:
                  type: array
                  items:
                    type: integer
                  default:
                    - 1000
                    - 1000
                  description: >-
                    The desired size of the final image, after the expansion.
                    should have an area of less than 5000x5000 pixels.
                original_image_size:
                  type: array
                  items:
                    type: integer
                  description: >-
                    The desired size of the original image, inside the full
                    canvas. Ensure that the ratio of input image foreground or
                    main subject to the canvas area is greater than 15% to
                    achieve optimal results.
                original_image_location:
                  type: array
                  items:
                    type: integer
                  description: >-
                    The desired location of the original image, inside the full
                    canvas. Provide the location of the upper left corner of the
                    original image. The location can also be outside the canvas
                    (the original image will be cropped).
                prompt:
                  type: string
                  description: >-
                    Text on which you wish to base the image expansion. This
                    parameter is optional. Bria currently supports prompts in
                    English only, excluding special characters.
                seed:
                  type: integer
                  description: >-
                    You can choose whether you want your generated expension to
                    be random or predictable. You can recreate the same result
                    in the future by using the seed value of a result from the
                    response. You can exclude this parameter if you are not
                    interested in recreating your results. This parameter is
                    optional.
                negative_prompt:
                  type: string
                  description: >-
                    This parameter is optional. Bria currently supports prompts
                    in English only.
                content_moderation:
                  type: boolean
                  default: false
                  description: >
                    When enabled, applies content moderation to both input
                    visuals and expanded output.


                    For input images:

                    - Processing stops if the image fails moderation

                    - Returns a 422 error with details about which parameter
                    failed


                    For output image:

                    - If the expanded image fails moderation, returns a 422
                    error
              example:
                image_url: URL
                canvas_size:
                  - 1200
                  - 674
                original_image_size:
                  - 610
                  - 855
                original_image_location:
                  - 301
                  - -66
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  description:
                    type: string
                    example: SUCCESS
                  message:
                    type: string
                    example: Finished sucessfully
                    description: >-
                      A message that describes the request status. The options
                      are Finished sucessfully, Content might not be safe for
                      work.
                  prompt:
                    type: string
                    example: >-
                      a man in a shirt sitting down in front of a brick wall
                      looking off to the side
                    description: >-
                      The prompt used to generate the expansion. If you want to
                      recreate the result again, you should use in the request
                      the prompt and the seed of the response.
                  result_url:
                    type: string
                    description: >-
                      URL that represents the updated visual created in the
                      request. It is a temporary URL that will expire
                    example: URL
                  seed:
                    type: integer
                    example: 1525972691
                    description: >-
                      If you want to recreate the result again, you should use
                      in the request the prompt and the seed of the response.
                  status:
                    type: string
                    example: SUCCESS
                    description: The request status. The options are SUCCESS, NSFW.
        '400':
          description: Bad request. Missing or invalid parameters.
        '401':
          description: Unauthorized. Invalid API key or authentication token.
        '404':
          description: Not found. Image could not be found at the provided URL.
        '413':
