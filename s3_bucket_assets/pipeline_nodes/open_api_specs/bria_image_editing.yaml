        '460':
          description: Failed to download image.
        '500':
          description: Internal server error. An error occurred on the server.
  /image/increase_resolution:
    post:
      summary: Increase Resolution
      tags:
        - Endpoints
      description: "\n\n**Description**\n\n\nThe\_*Increase Resolution Route*\_is used to upscale the resolution of any image.\n\nThis API endpoint supports content moderation via an optional parameter that can prevent processing if input images contain inappropriate content or if the modified output would contain inappropriate content.\n\n**Constraints**\n\nThe Bria API currently supports only JPEG and PNG files in RGB, RGBA, or CMYK color modes. When the file is of a different type or color mode, the status code 415 will be returned. \n\nIt's possible to increase the resolution of an image up to a total area of 8192x8192 pixels.\n\n**Increase the Resolution of an image using the image file**\n\n\n  In our documentation request example, we demonstrate how to Increase the Resolution of an image using the image URL.\n  \n  \n  If you want to use an image from a file, follow the example below:\n\n\n      import requests\n\n      url = \"https://engine.prod.bria-api.com/v1/image/increase_resolution?desired_increase=2\"\n\n      payload = {}\n      files=[\n        ('file',('image_name.jpeg',open('/path_to_local_file/image_name.jpeg','rb'),'image/jpeg'))\n      ]\n      headers = {\n        'api_token': 'xxxx'\n      }\n\n      response = requests.request(\"POST\", url, headers=headers, data=payload, files=files)\n\n      print(response.text)\n                "
      operationId: increase-resolution
      parameters:
        - in: header
          name: api_token
          schema:
            type: string
          required: true
        - in: query
          name: desired_increase
          schema:
            type: integer
            example: 2
          description: >-
            The resolution multiplier. The possible value are 2,4. It's possible
            to increase the resolution of an image up to a total area of
            8,192x8,192 pixels.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: >-
                    The image file you would like to increase the resolution
                    for. Minimum resolution supported for width and/or height is
                    216 pixels.
                  type: string
                  format: binary
                image_url:
                  description: >-
                    The URL of the image file you would like to increase the
                    resolution for. The URL should lead to an image publicly
                    available online. Either a file or an image_url should be
                    provided. If both are provided, then the route will use
                    image_url. Minimum resolution supported for width and/or
                    height is 216 pixels.
                  type: string
                content_moderation:
                  type: boolean
                  default: false
                  description: >
                    When enabled, applies content moderation to both input
                    visuals and modified outputs.


                    For input images:

                    - Processing stops if the image fails moderation

                    - Returns a 422 error with details about which parameter
                    failed


                    For output images:

                    - If the modified image fails moderation, returns a 422
                    error
            example:
              image_url: >-
                https://i.natgeofe.com/n/548467d8-c5f1-4551-9f58-6817a8d2c45e/NationalGeographic_2572187_square.jpg
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result_url:
                    type: string
                    description: >-
                      URL that represents the updated visual created in the
                      request. It is a temporary URL that will expire
        '400':
          description: Bad request
        '405':
          description: Method not allowed.
        '406':
          description: >-
            Increased image resolution will exceed maximum size 8K UHD (67108864
            pixels).
        '413':
          description: Payload too large. Image file size exceeds the 12MB limit.
        '415':
          description: >-
            Unsupported media type. Invalid file type. Supported file types are
            jpeg, jpg, png, webp.
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                type: string
              examples:
                input_violation:
                  value: >-
                    The request could not be completed because the visual in the
                    '{parameter_name}' parameter did not pass content
                    moderation.
                output_violation:
                  value: >-
                    The request could not be completed because the modified
                    visual did not pass content moderation.
        '429':
          description: >-
            Request limit exceeded. Your account has reached its maximum allowed
            requests. Please upgrade your plan or try again later.
        '460':
          description: Failed to download image.
        '500':
          description: Internal server error.
        '506':
          description: Insufficient data. The given input is not supported by the Bria API.
