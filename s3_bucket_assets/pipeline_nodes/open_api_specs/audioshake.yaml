openapi: 3.0.0
info:
  title: Groovy API
  version: 1.0.0
  description: AudioShake API
  license:
    name: © 2021 - 2025 AudioShake. All Rights Reserved
    url: https://audioshake.ai
  contact:
    name: AudioShake
    url: https://audioshake.ai
components:
  securitySchemes:
    token:
      type: http
      scheme: bearer
      in: header
      bearerFormat: JWT
  schemas:
    def-0:
      type: object
      required:
        - id
        - name
        - clientId
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        clientId:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        fileId:
          type: string
          format: uuid
        format:
          type: string
          description: The mimetype format of the asset.
          example: wav
        fileType:
          type: string
          description: The mimetype format of the asset.
          example: audio
        metadata:
          type: object
          description: Metadata associated with a asset.
        type:
          type: string
          description: Describes the type of asset.
          enum:
            - source
            - stem
      title: Asset
    def-1:
      type: object
      required:
        - requestId
        - stemMetadata
        - callbackUrl
        - clientId
        - status
      properties:
        id:
          type: string
          format: uuid
        requestId:
          type: string
          format: uuid
          description: The request id.
        clientId:
          type: string
          format: uuid
          description: The client id.
        licenseId:
          type: string
          format: uuid
          description: The license id.
        stemMetadata:
          type: object
          description: Metadata associated with a stem.
        callbackUrl:
          type: string
          description: Url to call back to client.
        status:
          type: string
          enum:
            - created
            - processing
            - completed
      title: Job
paths:
  /download/:
    get:
      summary: Download a group of files as a zip.
      tags:
        - download
      parameters:
        - schema:
            type: string
          in: query
          name: sourceAssetName
          required: false
        - schema:
            type: string
          in: query
          name: userSessionId
          required: false
        - schema:
            type: string
          in: query
          name: audioId
          required: false
      responses:
        '200':
          description: Default Response
  /job/:
    post:
      summary: Create a new job.
      tags:
        - job
      requestBody:
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - type: object
                  required:
                    - metadata
                    - assetId
                  properties:
                    callbackUrl:
                      type: string
                      format: uri
                      minLength: 4
                      description: The callback URL for job status notifications. Must be a valid URI with a minimum length of 4 characters.
                    assetId:
                      type: string
                      minLength: 8
                      maxLength: 30
                      description: A unique identifier for the asset. Must be a string with a minimum length of 8 characters and a maximum length of 30 characters.
                    metadata:
                      type: object
                      maxProperties: 10
                      oneOf:
                        - required:
                            - format
                            - name
                        - required:
                            - formats
                            - name
                      properties:
                        name:
                          type: string
                        format:
                          type: string
                        formats:
                          type: array
                          items:
                            type: string
                        otherAssets:
                          type: array
                        customProperty:
                          type: string
                          maxLength: 1000
                          description: "A custom string for client use or debugging. Maximum length: 1000 characters. This is an optional property."
                        residual:
                          type: boolean
                          description: "Set this flag to true to return a separate residual file. This is an optional property."
                        variant:
                          type: string
                          description: "The variant of the stem you want to generate. This is an optional property."
                        userSessionId:
                          type: string
                          description: Represents the user session ID associated with this job.
                        audioId:
                          type: string
                          description: Represents the custom unique audio file ID associated with this job.
                        licenseId:
                          type: string
                          description: The license ID associated with this job.
                        maxTrackLength:
                          type: number
                          minimum: 20
                          description: "The maximum length of the track in seconds. This is an optional property."
                        preview:
                          type: boolean
                          description: "Set this flag to true to return a separate preview mp3 file. This is an optional property."
                        watermarkInterval:
                          type: number
                          minimum: 10
                          description: "The interval for watermark in seconds. This is an optional property."
                        language:
                          type: string
                          pattern: ^[a-zA-Z]{2}$
                          enum:
