                        stemName: vocals
                    callbackUrl:
                      type: string
                      format: uri
                      minLength: 4
                      description: The callback URL for job status notifications. Must be a valid URI with a minimum length of 4 characters.
                    assetId:
                      type: string
                      minLength: 8
                      maxLength: 30
                      description: A unique identifier for the asset. Must be a string with a minimum length of 8 characters and a maximum length of 30 characters.
