  /upload/link:
    post:
      summary: Create a new asset from a file link.
      tags:
        - upload
      description: This route will only work for files that are publicly accessible. Use this route for both audio files for separation or transcription json files for alignment.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - link
              properties:
                link:
                  type: string
                  format: uri
                  minLength: 4
                name:
                  type: string
                  minLength: 3
                  maxLength: 300
        required: true
      responses:
        2XX:
          description: Default Response
