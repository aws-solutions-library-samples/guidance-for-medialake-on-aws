openapi: 3.0.0
info:
  title: AWS Transcribe
  version: 2023-10-15
  description: "Amazon Transcribe API for speech-to-text conversion and audio analysis"
  license:
    name: Apache 2.0
    url: https://aws.amazon.com/apache-2-0/
  contact:
    name: AWS Support
    url: https://aws.amazon.com/support/
    email: aws-support@amazon.com

servers:
  - url: https://transcribe.{region}.amazonaws.com
    description: AWS Transcribe regional endpoint
    variables:
      region:
        default: us-east-1
        enum:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - eu-west-1
          - eu-west-2
          - eu-central-1
          - ap-northeast-1
          - ap-northeast-2
          - ap-southeast-1
          - ap-southeast-2
          - sa-east-1

components:
  securitySchemes:
    awsSignatureV4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication

  schemas:
    TranscriptionJob:
      type: object
      required:
        - TranscriptionJobName
        - LanguageCode
        - MediaFormat
        - Media
      properties:
        TranscriptionJobName:
          type: string
          description: The name of the transcription job
          maxLength: 200
          pattern: ^[0-9a-zA-Z._-]+
        LanguageCode:
          type: string
          description: The language code for the language used in the input media file
          enum:
            - en-US
            - en-GB
            - es-US
            - fr-CA
            - fr-FR
            - de-DE
            - ja-JP
            - ko-KR
            - pt-BR
            - zh-CN
            - en-AU
            - ar-SA
            - hi-IN
            - ru-RU
        MediaFormat:
          type: string
          description: The format of the input media file
          enum:
            - mp3
            - mp4
            - wav
            - flac
            - ogg
            - amr
            - webm
        Media:
          type: object
          description: The object containing the Amazon S3 location of the media file
          required:
            - MediaFileUri
          properties:
            MediaFileUri:
              type: string
              description: The S3 URI of the media file
              pattern: ^s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/.*)?$
        OutputBucketName:
          type: string
          description: The Amazon S3 bucket where the transcription is stored
        OutputKey:
          type: string
          description: The Amazon S3 key for the transcription output
        Settings:
          type: object
          description: Optional settings for the transcription job
          properties:
            VocabularyName:
              type: string
              description: The name of a custom vocabulary to use
            ShowSpeakerLabels:
              type: boolean
              description: Determines whether to label the speakers in the output
            MaxSpeakerLabels:
              type: integer
              description: The maximum number of speakers to identify
              minimum: 2
              maximum: 10
            ChannelIdentification:
              type: boolean
              description: "Enables channel identification in multi-channel audio"
            ShowAlternatives:
              type: boolean
              description: Determines whether alternative transcriptions are generated
            MaxAlternatives:
              type: integer
              description: The maximum number of alternative transcriptions
              minimum: 2
              maximum: 10
            ContentRedaction:
              type: object
              description: Settings for content redaction
              properties:
                RedactionType:
                  type: string
                  enum:
                    - PII
                RedactionOutput:
                  type: string
                  enum:
                    - redacted
                    - redacted_and_unredacted
            IdentifyLanguage:
              type: boolean
              description: Enable language identification
            LanguageOptions:
              type: array
              description: "An array of language codes (used with IdentifyLanguage)"
              items:
                type: string
                enum:
                  - en-US
                  - en-GB
                  - es-US
                  - fr-CA
                  - fr-FR
                  - de-DE
                  - ja-JP
                  - ko-KR
                  - pt-BR
                  - zh-CN
        JobStatus:
          type: string
          readOnly: true
          description: The status of the transcription job
          enum:
            - QUEUED
            - IN_PROGRESS
            - FAILED
            - COMPLETED
        FailureReason:
          type: string
          readOnly: true
          description: If the JobStatus is FAILED, this field contains the reason for the failure
        CreationTime:
          type: string
          format: date-time
          readOnly: true
          description: The date and time the job was created
        CompletionTime:
          type: string
          format: date-time
          readOnly: true
          description: The date and time the job was completed
        Transcript:
          type: object
          readOnly: true
          description: The transcription output
          properties:
            TranscriptFileUri:
              type: string
              description: The S3 URI containing the transcription result
            RedactedTranscriptFileUri:
              type: string
              description: The S3 URI containing the redacted transcription result

    VocabularyInfo:
      type: object
      properties:
        VocabularyName:
          type: string
          description: The name of the vocabulary
        LanguageCode:
          type: string
          description: The language code of the vocabulary
        LastModifiedTime:
          type: string
          format: date-time
          description: The date and time the vocabulary was last modified
        VocabularyState:
          type: string
          description: The processing state of the vocabulary
          enum:
            - PENDING
            - READY
            - FAILED

    CustomVocabulary:
      type: object
      required:
        - VocabularyName
        - LanguageCode
        - Phrases
      properties:
        VocabularyName:
          type: string
          description: The name of the vocabulary
          pattern: ^[0-9a-zA-Z._-]+
        LanguageCode:
          type: string
          description: The language code of the vocabulary entries
          enum:
            - en-US
            - en-GB
            - es-US
            - fr-CA
            - fr-FR
            - de-DE
            - ja-JP
            - ko-KR
            - pt-BR
            - zh-CN
        Phrases:
          type: array
          description: The phrases in the vocabulary
          items:
            type: string

    TranscriptionJobSummary:
      type: object
      properties:
        TranscriptionJobName:
          type: string
          description: The name of the transcription job
        CreationTime:
          type: string
          format: date-time
          description: When the transcription job was created
        CompletionTime:
          type: string
          format: date-time
          description: When the transcription job was completed
        LanguageCode:
          type: string
          description: The language identified in the transcription job
        TranscriptionJobStatus:
          type: string
          description: The status of the transcription job
          enum:
            - QUEUED
            - IN_PROGRESS
            - FAILED
            - COMPLETED
        FailureReason:
          type: string
          description: If the job failed, the reason for the failure

    Error:
      type: object
      properties:
        code:
          type: string
          description: Error code returned by the service
        message:
          type: string
          description: Description of the error

paths:
  /transcription-jobs:
    post:
      summary: Start a new transcription job
      operationId: StartTranscriptionJob
      tags:
        - TranscriptionJobs
      security:
        - awsSignatureV4: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranscriptionJob'
      responses:
        '200':
          description: Successfully started transcription job
          content:
            application/json:
              schema:
                type: object
                properties:
                  TranscriptionJob:
                    $ref: '#/components/schemas/TranscriptionJob'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    get:
      summary: List transcription jobs
      operationId: ListTranscriptionJobs
      tags:
        - TranscriptionJobs
      security:
        - awsSignatureV4: []
      parameters:
        - name: Status
          in: query
          description: Filter the jobs by status
          schema:
            type: string
            enum:
              - IN_PROGRESS
              - FAILED
              - COMPLETED
              - QUEUED
        - name: JobNameContains
          in: query
          description: Filter the jobs by name
          schema:
            type: string
        - name: NextToken
          in: query
          description: The token to retrieve the next set of results
          schema:
            type: string
        - name: MaxResults
          in: query
          description: The maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Successfully retrieved transcription jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  TranscriptionJobSummaries:
                    type: array
                    items:
                      $ref: '#/components/schemas/TranscriptionJobSummary'
                  NextToken:
                    type: string
                    description: The token to retrieve the next set of results
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /transcription-jobs/{transcriptionJobName}:
    get:
      summary: Get a transcription job
      operationId: GetTranscriptionJob
      tags:
        - TranscriptionJobs
      security:
        - awsSignatureV4: []
      parameters:
        - name: transcriptionJobName
          in: path
          required: true
          description: The name of the transcription job
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the transcription job
          content:
            application/json:
              schema:
                type: object
                properties:
                  TranscriptionJob:
                    $ref: '#/components/schemas/TranscriptionJob'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    delete:
      summary: Delete a transcription job
      operationId: DeleteTranscriptionJob
      tags:
        - TranscriptionJobs
      security:
        - awsSignatureV4: []
      parameters:
        - name: transcriptionJobName
          in: path
          required: true
          description: The name of the transcription job
          schema:
            type: string
      responses:
        '200':
          description: Successfully deleted the transcription job
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /vocabularies:
    post:
      summary: Create a custom vocabulary
      operationId: CreateVocabulary
      tags:
        - Vocabularies
      security:
        - awsSignatureV4: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomVocabulary'
      responses:
        '200':
          description: Successfully created a custom vocabulary
          content:
            application/json:
              schema:
                type: object
                properties:
                  VocabularyName:
                    type: string
                  LanguageCode:
                    type: string
                  VocabularyState:
                    type: string
                    enum:
                      - PENDING
                      - READY
                      - FAILED
                  LastModifiedTime:
                    type: string
                    format: date-time
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    get:
      summary: List custom vocabularies
      operationId: ListVocabularies
      tags:
        - Vocabularies
      security:
        - awsSignatureV4: []
      parameters:
        - name: NextToken
          in: query
          description: The token to retrieve the next set of results
          schema:
            type: string
        - name: MaxResults
          in: query
          description: The maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
        - name: StateEquals
          in: query
          description: Filter the vocabularies by state
          schema:
            type: string
            enum:
              - PENDING
              - READY
              - FAILED
        - name: NameContains
          in: query
          description: Filter the vocabularies by name
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved custom vocabularies
          content:
            application/json:
              schema:
                type: object
                properties:
                  Vocabularies:
                    type: array
                    items:
                      $ref: '#/components/schemas/VocabularyInfo'
                  NextToken:
                    type: string
                    description: The token to retrieve the next set of results
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /vocabularies/{vocabularyName}:
    get:
      summary: Get a custom vocabulary
      operationId: GetVocabulary
      tags:
        - Vocabularies
      security:
        - awsSignatureV4: []
      parameters:
        - name: vocabularyName
          in: path
          required: true
          description: The name of the vocabulary
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the vocabulary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocabularyInfo'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    delete:
      summary: Delete a custom vocabulary
      operationId: DeleteVocabulary
      tags:
        - Vocabularies
      security:
        - awsSignatureV4: []
      parameters:
        - name: vocabularyName
          in: path
          required: true
          description: The name of the vocabulary
          schema:
            type: string
      responses:
        '200':
          description: Successfully deleted the vocabulary
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /streaming-transcription:
    post:
      summary: Start a WebSocket streaming transcription session
      operationId: StartStreamTranscription
      tags:
        - StreamingTranscription
      description: "This endpoint creates a WebSocket connection for real-time audio streaming and transcription"
      security:
        - awsSignatureV4: []
      parameters:
        - name: language-code
          in: query
          required: true
          description: The language code for the input audio
          schema:
            type: string
            enum:
              - en-US
              - en-GB
              - es-US
              - fr-CA
              - fr-FR
              - de-DE
        - name: media-encoding
          in: query
          required: true
          description: The encoding of the audio data sent
          schema:
            type: string
            enum:
              - pcm
              - ogg-opus
              - flac
        - name: sample-rate
          in: query
          required: true
          description: The sample rate of the audio in Hz
          schema:
            type: integer
        - name: vocabulary-name
          in: query
          description: The name of a custom vocabulary
          schema:
            type: string
        - name: session-id
          in: query
          description: A unique identifier for the session
          schema:
            type: string
        - name: show-speaker-label
          in: query
          description: Enables speaker identification
          schema:
            type: boolean
        - name: enable-channel-identification
          in: query
          description: "Enables channel identification for multi-channel audio"
          schema:
            type: boolean
      responses:
        '101':
          description: "Switching Protocols - WebSocket connection established"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

tags:
  - name: TranscriptionJobs
    description: Create and manage batch transcription jobs
  - name: Vocabularies
    description: Create and manage custom vocabularies for improved transcription accuracy
  - name: StreamingTranscription
    description: "Real-time audio transcription via WebSockets"

security:
  - awsSignatureV4: [] 