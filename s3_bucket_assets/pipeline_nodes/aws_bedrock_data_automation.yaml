openapi: 3.0.0
info:
    title: AWS Bedrock Data Automation
    version: 1.0
    description: AWS Bedrock Automation for video, image, audio, and text understanding

security:
  - awsIam: []

paths:
  /foundation-models:
    get:
      summary: List foundation models
      operationId: list_foundation_models
      tags: [Foundation Models]
      x-medialake-formData: aws_bedrock_data_automation/foundation_models
      parameters:
        - name: byProvider
          in: query
          description: Filter models by provider
          schema:
            type: string
        - name: byCustomizationType
          in: query
          schema:
            type: string
            enum: [FINE_TUNING, CONTINUED_PRE_TRAINING]
        - name: byOutputModality
          in: query
          schema:
            type: string
            enum: [TEXT, IMAGE, EMBEDDING]
        - name: byInferenceType
          in: query
          schema:
            type: string
            enum: [ON_DEMAND, PROVISIONED]
      responses:
        '200':
          description: List of foundation models
          content:
            application/json:
              schema:
                type: object
                properties:
                  modelSummaries:
                    type: array
                    items:
                      type: object
                      properties:
                        modelArn:
                          type: string
                        modelId:
                          type: string
                        modelName:
                          type: string
                        providerName:
                          type: string
                        responseStreamingSupported:
                          type: boolean
  /data-automation-projects:
    post:
      summary: Create data automation project for media processing
      operationId: create_data_automation_project
      tags: [Media Processing]
      x-medialake-formData: aws_bedrock_data_automation/data_automation_projects/post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectName, standardOutputConfiguration]
              properties:
                projectName:
                  type: string
                projectDescription:
                  type: string
                projectStage:
                  type: string
                  enum: [DEVELOPMENT, LIVE]
                standardOutputConfiguration:
                  type: object
                  properties:
                    video:
                      type: object
                      properties:
                        extraction:
                          type: object
                          required: [category, boundingBox]
                          properties:
                            category:
                              type: object
                              required: [state, types]
                              properties:
                                state:
                                  type: string
                                  enum: [ENABLED, DISABLED]
                                types:
                                  type: array
                                  items:
                                    type: string
                                    enum: [CONTENT_MODERATION, TEXT_DETECTION, TRANSCRIPT]
                            boundingBox:
                              type: object
                              required: [state]
                              properties:
                                state:
                                  type: string
                                  enum: [ENABLED, DISABLED]
                        generativeField:
                          type: object
                          required: [state, types]
                          properties:
                            state:
                              type: string
                              enum: [ENABLED, DISABLED]
                            types:
                              type: array
                              items:
                                type: string
                                enum: [VIDEO_SUMMARY, SCENE_SUMMARY, IAB]
                    audio:
                      type: object
                      properties:
                        extraction:
                          type: object
                          required: [category]
                          properties:
                            category:
                              type: object
                              required: [state, types]
                              properties:
                                state:
                                  type: string
                                  enum: [ENABLED, DISABLED]
                                types:
                                  type: array
                                  items:
                                    type: string
                                    enum: [AUDIO_CONTENT_MODERATION, CHAPTER_CONTENT_MODERATION, TRANSCRIPT]
                        generativeField:
                          type: object
                          required: [state, types]
                          properties:
                            state:
                              type: string
                              enum: [ENABLED, DISABLED]
                            types:
                              type: array
                              items:
                                type: string
                                enum: [AUDIO_SUMMARY, CHAPTER_SUMMARY, IAB]
                    image:
                      type: object
                      properties:
                        extraction:
                          type: object
                          required: [category, boundingBox]
                          properties:
                            category:
                              type: object
                              required: [state, types]
                              properties:
                                state:
                                  type: string
                                  enum: [ENABLED, DISABLED]
                                types:
                                  type: array
                                  items:
                                    type: string
                                    enum: [CONTENT_MODERATION, TEXT_DETECTION]
                            boundingBox:
                              type: object
                              required: [state]
                              properties:
                                state:
                                  type: string
                                  enum: [ENABLED, DISABLED]
                        generativeField:
                          type: object
                          required: [state, types]
                          properties:
                            state:
                              type: string
                              enum: [ENABLED, DISABLED]
                            types:
                              type: array
                              items:
                                type: string
                                enum: [IMAGE_SUMMARY, IAB]