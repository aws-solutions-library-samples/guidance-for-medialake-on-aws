[pytest]
# Pytest configuration for Settings API Lambda

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts =
    --verbose
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    -p no:warnings

# Environment variables for tests
env =
    AWS_DEFAULT_REGION=us-east-1
    COLLECTIONS_TABLE_NAME=test-collections-table
    ENVIRONMENT=test
    LOG_LEVEL=INFO

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
