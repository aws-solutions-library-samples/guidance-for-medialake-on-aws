repos:
  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1300"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json

  # Python - Auto-fixing
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          [
            "--in-place",
            "--remove-all-unused-imports",
            "--remove-unused-variables",
            "--remove-duplicate-keys",
            "--expand-star-imports",
          ]

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: ["--line-length=88", "--fast"]

  # Run flake8 AFTER formatting (warnings only for now)
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: [
            "--max-line-length=88",
            "--extend-ignore=E203,W503,E501,E266",
            "--max-complexity=15",
            "--exit-zero", # Don't fail on linting findings
          ]

  # TypeScript/JavaScript - Auto-fixing with more lenient rules
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        args: ["--write"]
        files: \.(ts|tsx|js|jsx|json|ya?ml|md)$
        exclude: |
          (?x)^(
            lambdas/nodes/image_metadata_extractor/.*|
            lambdas/layers/warmer/nodejs/.*
          )$

  # Commit message validation (Phase 1)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, --optional-scope]

  # Security scanning (Phase 2)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            package-lock\.json|
            \.secrets\.baseline|
            lambdas/api/collections/collections-openapi\.json|
            INTERNAL-ai-documentation/.*|
            lambdas/nodes/image_metadata_extractor/.*|
            lambdas/layers/warmer/nodejs/.*
          )$

