repos:
  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1300"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json

  # Python - Auto-fixing
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          [
            "--in-place",
            "--remove-all-unused-imports",
            "--remove-unused-variables",
            "--remove-duplicate-keys",
            "--expand-star-imports",
          ]

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: ["--line-length=88", "--fast"]

  # Run flake8 AFTER formatting (warnings only for now)
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: [
            "--max-line-length=88",
            "--extend-ignore=E203,W503,E501,E266",
            "--max-complexity=15",
            "--exit-zero", # Don't fail on linting findings
          ]

  # TypeScript/JavaScript - Auto-fixing with more lenient rules
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0 # Pinned to stable v3 to match package.json
    hooks:
      - id: prettier
        args: ["--write"]
        files: \.(ts|tsx|js|jsx|json|ya?ml|md)$
        exclude: |
          (?x)^(
            lambdas/nodes/image_metadata_extractor/.*|
            lambdas/layers/warmer/nodejs/.*|
            \.kiro/.*|
            medialake_user_interface/tests/integration/comprehensive-user-lifecycle-e2e\.spec\.ts|
            medialake_user_interface/src/types/shared/assetComponents\.ts
          )$

  # ESLint for TypeScript/JavaScript - Check for unused imports
  # Temporarily disabled
  # - repo: local
  #   hooks:
  #     - id: eslint
  #       name: eslint
  #       entry: bash -c 'cd medialake_user_interface && npx eslint "${@#medialake_user_interface/}"' --
  #       language: system
  #       files: ^medialake_user_interface/src/.*\.(ts|tsx)$
  #       args:
  #         [
  #           "--quiet",
  #           "--rule",
  #           "@typescript-eslint/no-unused-vars: error",
  #           "--rule",
  #           "no-unused-vars: error",
  #         ]
  #       pass_filenames: true

  # i18n hardcoded string check - validates translation keys and warns about hardcoded strings
  - repo: local
    hooks:
      - id: i18n-strings
        name: i18n-strings
        entry: node medialake_user_interface/scripts/check-i18n-strings.cjs
        language: system
        files: ^medialake_user_interface/src/.*\.tsx$
        exclude: |
          (?x)^(
            medialake_user_interface/src/.*\.test\.tsx|
            medialake_user_interface/src/.*\.spec\.tsx|
            medialake_user_interface/src/.*\.stories\.tsx|
            medialake_user_interface/src/i18n/.*
          )$
        pass_filenames: true
        verbose: true

      # i18n locale completeness check - ensures all locale files have translations for keys in en.ts
      - id: i18n-locale-completeness
        name: i18n-locale-completeness
        entry: node medialake_user_interface/scripts/check-locale-completeness.cjs
        language: system
        files: ^medialake_user_interface/src/i18n/locales/.*\.ts$
        pass_filenames: false
        verbose: true

      # i18n unused keys check - warns about translation keys that are not used in the codebase
      - id: i18n-unused-keys
        name: i18n-unused-keys
        entry: node medialake_user_interface/scripts/check-unused-translations.cjs
        language: system
        files: ^medialake_user_interface/src/i18n/locales/en\.ts$
        pass_filenames: false
        verbose: true

  # Commit message validation (Phase 1)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, --optional-scope]

  # Security scanning (Phase 2)
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks protect --staged --config .gitleaks.toml --verbose
        language: system
        pass_filenames: false

