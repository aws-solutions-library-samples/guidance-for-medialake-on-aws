repos:
  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json
      - id: pretty-format-json
        args: ["--autofix", "--indent=2"]
        exclude: '^(pipeline_library/|\.roo/|s3_bucket_assets/|lambdas/)'

  # Python - Auto-fixing
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.2.1
    hooks:
      - id: autoflake
        args:
          [
            "--in-place",
            "--remove-all-unused-imports",
            "--remove-unused-variables",
            "--remove-duplicate-keys",
            "--expand-star-imports",
          ]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        args: ["--line-length=88"]

  # Run flake8 AFTER formatting (warnings only for now)
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          [
            "--max-line-length=88",
            "--extend-ignore=E203,W503,E501,F841,F401,F821,E722,E266,E402,F541,E122,E999,C901",
            "--max-complexity=15",
          ]

  # TypeScript/JavaScript - Auto-fixing with more lenient rules
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        args: ["--write"]
        files: \.(ts|tsx|js|jsx|json|ya?ml|md)$
        exclude: |
          (?x)^(
            lambdas/nodes/image_metadata_extractor/.*|
            lambdas/layers/warmer/nodejs/.*
          )$

  # ESLint with auto-fix and warnings-only mode
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        args: ["--fix", "--max-warnings=1000"] # Allow warnings, only fail on errors
        files: \.[jt]sx?$
        types: [file]
        exclude: |
          (?x)^(
            lambdas/nodes/image_metadata_extractor/.*|
            lambdas/layers/warmer/nodejs/.*
          )$
        additional_dependencies:
          - eslint@8.56.0
          - eslint-config-prettier
          - eslint-plugin-react
          - eslint-plugin-react-hooks
          - "@typescript-eslint/parser"
          - "@typescript-eslint/eslint-plugin"

  # CDK Specific
  - repo: local
    hooks:
      - id: cdk-synth-check
        name: CDK Synth Check (Fast)
        entry: bash -c 'cd cdk && CDK_SKIP_BUNDLING=true npx cdk synth --quiet -c skip-bundling=true'
        language: system
        files: cdk/.*\.(py|ts)$
        pass_filenames: false

      # Clean up
      - id: remove-ds-store
        name: Remove .DS_Store files
        entry: find . -name .DS_Store -type f -delete
        language: system
        pass_filenames: false
