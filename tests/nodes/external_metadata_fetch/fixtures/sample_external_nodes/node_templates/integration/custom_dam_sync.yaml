spec: v1.0.0
node:
  id: custom_dam_sync
  title: Custom DAM Sync
  description: Synchronize asset metadata bidirectionally with an external Digital Asset Management system via webhook-triggered REST calls
  version: 1.0.0
  type: integration
  integration:
    config:
      lambda:
        handler: integration/CustomDamSyncLambdaDeployment
        runtime: python3.12
        timeout: 120
        lambda_source_path: lambda_source/custom_dam_sync
        iam_policy:
          statements:
            - effect: Allow
              actions:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              resources:
                - "*"
            - effect: Allow
              actions:
                - secretsmanager:GetSecretValue
              resources:
                - arn:aws:secretsmanager:${AWS_REGION}:${ACCOUNT_ID}:secret:medialake/*
            - effect: Allow
              actions:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:PutItem
                - dynamodb:Query
              resources:
                - ${MEDIALAKE_ASSET_TABLE}
                - ${MEDIALAKE_ASSET_TABLE}/index/*
            - effect: Allow
              actions:
                - events:PutEvents
              resources:
                - arn:aws:events:${AWS_REGION}:${ACCOUNT_ID}:event-bus/${PIPELINES_EVENT_BUS_NAME}
            - effect: Allow
              actions:
                - kms:Decrypt
              resources:
                - arn:aws:kms:${AWS_REGION}:${ACCOUNT_ID}:key/*
actions:
  sync_metadata:
    summary: Sync DAM Metadata
    description: Pull latest metadata from external DAM and update the asset record, optionally pushing MediaLake changes back
    operationId: syncDamMetadata
    parameters:
      - in: body
        name: dam_api_url
        label: DAM API Base URL
        description: Base URL of the external DAM REST API
        placeholder: "https://dam.example.com/api/v2"
        required: true
        schema:
          type: string
      - in: body
        name: auth_type
        label: Authentication Type
        description: Authentication method for the DAM API
        required: true
        schema:
          type: select
          options:
            - label: "OAuth2 Client Credentials"
              value: "oauth2_client_credentials"
            - label: "API Key"
              value: "api_key"
          default: oauth2_client_credentials
      - in: body
        name: secret_arn
        label: Credentials Secret ARN
        description: AWS Secrets Manager ARN containing DAM API credentials (must start with medialake/)
        placeholder: "arn:aws:secretsmanager:us-east-1:123456789012:secret:medialake/dam-credentials"
        required: true
        schema:
          type: string
      - in: body
        name: sync_direction
        label: Sync Direction
        description: Direction of metadata synchronization
        required: true
        schema:
          type: select
          options:
            - label: "Pull Only (DAM → MediaLake)"
              value: "pull"
            - label: "Push Only (MediaLake → DAM)"
              value: "push"
            - label: "Bidirectional"
              value: "bidirectional"
          default: pull
      - in: body
        name: conflict_resolution
        label: Conflict Resolution
        description: How to resolve conflicts when both systems have changes
        required: false
        schema:
          type: select
          options:
            - label: "DAM Wins"
              value: "source_wins"
            - label: "MediaLake Wins"
              value: "target_wins"
            - label: "Most Recent Wins"
              value: "latest_wins"
          default: source_wins
      - in: body
        name: field_mapping_s3_path
        label: Field Mapping Config Path
        description: S3 path to JSON field mapping configuration (relative to IAC assets bucket)
        placeholder: "dam-sync-configs/field-mapping.json"
        required: false
        schema:
          type: string
      - in: body
        name: max_retries
        label: Maximum Retries
        description: Maximum retry attempts for transient API errors
        required: false
        default: 3
        schema:
          type: integer
          minimum: 1
          maximum: 5
    connections:
      incoming:
        type: [any]
      outgoing:
        type: [any]
