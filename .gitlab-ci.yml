# Pre-commit hooks job for merge requests to main (excluding ESLint)
pre_commit_checks:
  stage: lint
  <<: *echo_versions
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
  script:
    - echo "Running pre-commit checks for merge request to main"
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install pre-commit
    - npm install
    # Install additional dependencies for pre-commit hooks
    - pip install autoflake isort black flake8
    - npm install -g prettier
    # Run pre-commit hooks excluding ESLint
    - pre-commit run --all-files trailing-whitespace
    - pre-commit run --all-files end-of-file-fixer
    - pre-commit run --all-files check-yaml
    - pre-commit run --all-files check-added-large-files
    - pre-commit run --all-files check-merge-conflict
    - pre-commit run --all-files detect-private-key
    - pre-commit run --all-files check-json
    - pre-commit run --all-files autoflake
    - pre-commit run --all-files isort
    - pre-commit run --all-files black
    - pre-commit run --all-files flake8
    - pre-commit run --all-files prettier
    - find . -name .DS_Store -type f -delete

sync-to-github:
  image: alpine:latest
  stage: deploy
  rules:
    - if: $CI_COMMIT_REF_NAME == "release"
  script:
    - apk add --no-cache git openssh rsync
    - mkdir -p ~/.ssh
    - echo "$GITHUB_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config --global user.email "medialake@amazon.com"
    - git config --global user.name "Media Lake CI"
    # Capture subject of the latest non-merge commit on the release branch
    - export RELEASE_COMMIT_MESSAGE=$(git log -1 --no-merges --pretty=format:%s)
    - echo "Using commit message:${RELEASE_COMMIT_MESSAGE}"
    # Clone GitHub repository to maintain its git history
    - git clone git@github.com:aws-solutions-library-samples/guidance-for-medialake-on-aws.git github-repo
    - cd github-repo
    - echo "Current GitHub main commit:" && git log --oneline -1
    # Copy all files from GitLab workspace (excluding .git) and delete files that do not exist in GitLab
    - rsync -av --delete --exclude=.git ../ ./
    # Remove files that shouldn't be in the public GitHub repository
    - rm -f secrets.txt
    - rm -rf docs/
    - rm -rf .roo/
    - rm -rf .kiro/
    - rm -rf github-repo/
    - rm -rf .traycer/
    - rm -rf INTERNAL-ai-documentation/
    - rm -rf AUTHORIZATION_FIX.md
    - rm -rf memory-bank/
    - rm -rf cdk-test-output/
    - rm -rf design/
    - rm -f setup-dev.sh
    - rm -f manage-hooks.sh
    - rm -f .gitleaksignore
    - rm -f fix.sh
    - rm -rf tests/
    - rm -rf scripts/
    - rm -f .roomodes
    - rm -f .pre-commit-config.yaml
    - rm -f .secrets.baseline
    - rm -f .gitlab-ci.yml
    - rm -f .gitattributes
    - rm -f .flake8
    - rm -rf .githooks/
    - rm -rf medialake_user_interface/test-results/
    - rm -rf medialake_user_interface/playwright-report/
    # Stage all changes and commit
    - git add -A
    - git commit --allow-empty -m "fix - Removed Lambda concurrency due to intermittent deployment stabilization issues"
    - echo "New commit created:" && git log --oneline -1
    # Push to GitHub main branch
    - git push origin main

playwright_e2e_test:
  stage: test
  timeout: 4h
  tags:
    - arch:amd64
    - size:large
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never
  # Commented out for faster testing iteration
  variables:
    AWS_CREDS_TARGET_ROLE: $US_WEST_2_AWS_IAM_ROLE
    TARGET_ROLE: $US_WEST_2_AWS_IAM_ROLE
    AWS_DEFAULT_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
    AWS_DEFAULT_REGION: $US_WEST_2_AWS_REGION
    DEPLOY_REGION: $US_WEST_2_AWS_REGION
    CDK_DEPLOY_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
    CDK_DEFAULT_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
    CDK_DEPLOY_REGION: $US_WEST_2_AWS_REGION
    STACK_PREFIX: "medialake"
    STACK_NAME: "medialake-e2e-test"
    ENVIRONMENT_NAME: "e2e"
    DEPLOYMENT_SIZE: "small"
    ZIP_FILE_NAME: "medialake-source-${CI_COMMIT_SHORT_SHA}.zip"
    #ACCESS_KEY_ID: $US_WEST_2_ACCESS_KEY
    #SECRET_ACCESS_KEY: $US_WEST_2_SECRET_KEY
  before_script:
    # Install required dependencies
    - yum update -y
    - yum install -y python3 python3-pip unzip which findutils zip
    # Install Node.js (required for Playwright)
    - curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
    - yum install -y nodejs
    - node --version
    - npm --version
    # Install AWS CLI
    - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    - unzip awscliv2.zip
    - ./aws/install
    # Configure AWS credentials for test execution
    # - aws configure set aws_access_key_id $ACCESS_KEY_ID
    # - aws configure set aws_secret_access_key $SECRET_ACCESS_KEY
    # - aws configure set default.region $DEPLOY_REGION
    - echo "AWS credentials configured for testing in region $DEPLOY_REGION"
    - cat $AWS_SHARED_CREDENTIALS_FILE
    - echo $AWS_CREDS_TARGET_ROLE
    - echo $AWS_DEFAULT_ACCOUNT
    - echo $AWS_DEFAULT_REGION
    - echo $DEPLOY_REGION
    - echo $CDK_DEPLOY_ACCOUNT
    - echo $CDK_DEFAULT_ACCOUNT
    - echo $CDK_DEPLOY_REGION
    - echo "Environment credentials overridden for testing"
    # Verify AWS access
    - cat /root/.aws/credentials
    - cat /root/.aws/config
    - whoami
    - aws s3 ls --profile default
    - aws sts get-caller-identity --profile default
    - echo "AWS identity verified for testing"
  script:
    - echo "Running comprehensive Playwright E2E test against deployed MediaLake infrastructure"
    - |
      # Function to refresh AWS credentials from credential vendor
      refresh_credentials() {
        echo "Refreshing AWS credentials..."
        if [ -f "$AWS_SHARED_CREDENTIALS_FILE" ]; then
          export AWS_ACCESS_KEY_ID=$(grep -A2 "\[default\]" $AWS_SHARED_CREDENTIALS_FILE | grep aws_access_key_id | cut -d'=' -f2 | tr -d ' ')
          export AWS_SECRET_ACCESS_KEY=$(grep -A2 "\[default\]" $AWS_SHARED_CREDENTIALS_FILE | grep aws_secret_access_key | cut -d'=' -f2 | tr -d ' ')
          export AWS_SESSION_TOKEN=$(grep -A2 "\[default\]" $AWS_SHARED_CREDENTIALS_FILE | grep aws_session_token | cut -d'=' -f2 | tr -d ' ')
          echo "Credentials refreshed successfully at $(date '+%H:%M:%S')"
        else
          echo "Warning: Credential file not found at $AWS_SHARED_CREDENTIALS_FILE"
        fi
      }
    - refresh_credentials
    - aws s3 ls --profile default
    - export BUCKET_UUID=$(python3 -c "import uuid; print(str(uuid.uuid4())[:8])")
    - export S3_BUCKET_NAME="medialake-deploy-${BUCKET_UUID}-${CI_COMMIT_SHORT_SHA}"
    - aws s3 mb s3://$S3_BUCKET_NAME --profile default
    - aws s3 ls s3://$S3_BUCKET_NAME/ --profile default
    - aws s3 cp medialake.template s3://$S3_BUCKET_NAME/medialake.template --profile default
    - |
      list_stacks() {
        local region=$1
        local stack_prefix="$STACK_PREFIX"
        # Get all stacks excluding DELETE_COMPLETE and filter case-insensitively for the prefix
        aws cloudformation list-stacks \
          --region $region \
          --profile default \
          --stack-status-filter CREATE_COMPLETE CREATE_FAILED CREATE_IN_PROGRESS REVIEW_IN_PROGRESS ROLLBACK_COMPLETE ROLLBACK_FAILED ROLLBACK_IN_PROGRESS UPDATE_COMPLETE UPDATE_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_IN_PROGRESS UPDATE_ROLLBACK_COMPLETE UPDATE_ROLLBACK_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_ROLLBACK_FAILED UPDATE_ROLLBACK_IN_PROGRESS DELETE_FAILED \
          --query "StackSummaries[].StackName" \
          --output text | tr '\t' '\n' | grep -i "$stack_prefix" || true
      }

      any_deleting() {
        local region=$1
        local stack_prefix="$STACK_PREFIX"
        local deleting_stacks=$(aws cloudformation list-stacks \
          --region $region \
          --profile default \
          --stack-status-filter DELETE_IN_PROGRESS \
          --query "StackSummaries[].StackName" \
          --output text | tr '\t' '\n' | grep -i "$stack_prefix" || true)
        if [ -z "$deleting_stacks" ]; then
          return 1
        else
          echo "Stacks currently being deleted in $region: $deleting_stacks"
          return 0
        fi
      }

      # Function to delete stacks in a specific region
      delete_stacks_in_region() {
        local region=$1
        echo "Starting comprehensive stack cleanup in region $region"
        echo "Will delete all stacks containing (case-insensitive): '$STACK_PREFIX'"
        local iteration=0
        # Main loop to delete stacks
        while true; do
          # Refresh credentials every 5 iterations (approximately every 5 minutes)
          if [ $((iteration % 5)) -eq 0 ] && [ $iteration -gt 0 ]; then
            echo "Refreshing credentials during stack cleanup (iteration $iteration)..."
            refresh_credentials
          fi
          iteration=$((iteration + 1))

          stacks=$(list_stacks "$region")
          if [ -z "$stacks" ]; then
            echo "No more medialake stacks found in region $region. Cleanup complete!"
            break
          fi
          echo "Found stacks in $region: $stacks"
          # Check if any stack is already being deleted
          if any_deleting "$region"; then
            echo "Waiting for in-progress deletions to complete in $region..."
          else
            # Attempt to delete each stack
            for stack in $stacks; do
              echo "Attempting to delete stack: $stack in region $region"
              # Check if stack is in DELETE_FAILED state and try with retain resources
              stack_status=$(aws cloudformation describe-stacks --stack-name "$stack" --region "$region" --profile default --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "STACK_NOT_FOUND")
              if [ "$stack_status" == "DELETE_FAILED" ]; then
                echo "Stack $stack is in DELETE_FAILED state. Attempting to get resources that failed to delete..."
                # Get resources that might have failed to delete
                resources=$(aws cloudformation list-stack-resources --stack-name "$stack" --region "$region" --profile default --query "StackResourceSummaries[?ResourceStatus=='DELETE_FAILED'].LogicalResourceId" --output text || true)
                if [ -n "$resources" ]; then
                  echo "Found resources that failed to delete: $resources"
                  echo "Attempting to delete stack with --retain-resources option"
                  aws cloudformation delete-stack \
                    --region $region \
                    --profile default \
                    --stack-name $stack \
                    --retain-resources $resources || true
                else
                  # Standard delete attempt
                  aws cloudformation delete-stack \
                    --region $region \
                    --profile default \
                    --stack-name $stack || true
                fi
              else
                # Standard delete attempt
                aws cloudformation delete-stack \
                  --region $region \
                  --profile default \
                  --stack-name $stack || true
              fi
              # Break after initiating one deletion to handle dependencies
              break
            done
          fi
          echo "Waiting 60 seconds before checking again in $region..."
          sleep 60
        done
      }
      # Check for existing CodePipelines that might conflict
      echo "Checking for existing CodePipelines in $DEPLOY_REGION..."
      for pipeline_candidate in "MediaLakeCDKPipeline" "CDKDeploymentPipeline"; do
        if aws codepipeline get-pipeline --name "$pipeline_candidate" --region $DEPLOY_REGION --profile default >/dev/null 2>&1; then
          echo "Found existing pipeline: $pipeline_candidate - will be cleaned up with stack deletion"
        fi
      done
      # First, destroy stacks in us-east-1
      delete_stacks_in_region "us-east-1"
      # Then destroy stacks in us-west-2 if different (for any regional resources)
      if [ "$DEPLOY_REGION" != "us-east-1" ]; then
        echo "Checking for regional resources in $DEPLOY_REGION..."
        delete_stacks_in_region "$DEPLOY_REGION"
      fi
      echo "Infrastructure cleanup completed. Proceeding with fresh deployment."
    - echo "Creating zip file of repository..."
    - zip -r $ZIP_FILE_NAME . -x "*.git*" "*.venv*" "*__pycache__*" "*.pyc" "*node_modules*" "*.DS_Store*"
    - ls -la $ZIP_FILE_NAME
    - refresh_credentials
    - 'echo "Uploading zip file to S3 bucket: $S3_BUCKET_NAME"'
    - aws s3 cp $ZIP_FILE_NAME s3://$S3_BUCKET_NAME/$ZIP_FILE_NAME --profile default
    - echo "Generating pre-signed URL for zip file..."
    - PRESIGNED_URL=$(aws s3 presign s3://$S3_BUCKET_NAME/$ZIP_FILE_NAME --expires-in 3600 --profile default)
    - echo "Pre-signed URL generated successfully"
    - refresh_credentials
    - 'echo "Deploying CloudFormation stack: $STACK_NAME"'
    - |
      aws cloudformation create-stack \
        --stack-name $STACK_NAME \
        --template-body file://medialake.template \
        --parameters \
          ParameterKey=SourceType,ParameterValue="S3PresignedURL" \
          ParameterKey=S3PresignedURL,ParameterValue="$PRESIGNED_URL" \
          ParameterKey=InitialUserFirstName,ParameterValue="Media" \
          ParameterKey=InitialUserLastName,ParameterValue="Lake" \
          ParameterKey=InitialUserEmail,ParameterValue="medialake+deploy@amazon.com" \
          ParameterKey=MediaLakeEnvironmentName,ParameterValue="$ENVIRONMENT_NAME" \
          ParameterKey=OpenSearchDeploymentSize,ParameterValue="$DEPLOYMENT_SIZE" \
        --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
        --profile default
    - echo "CloudFormation stack deployment initiated successfully"
    - echo "Stack name:$STACK_NAME"
    - |
      # Monitor CodePipeline execution similar to deploy-medialake.sh
      echo "Waiting for CodePipeline to be created by CloudFormation..."
      sleep 120  # Wait for pipeline creation
      # Check for pipeline existence (try multiple possible names)
      PIPELINE_NAME=""
      for pipeline_candidate in "MediaLakeCDKPipeline" "CDKDeploymentPipeline"; do
        if aws codepipeline get-pipeline --name "$pipeline_candidate" --profile default >/dev/null 2>&1; then
          PIPELINE_NAME="$pipeline_candidate"
          echo "Found pipeline: $PIPELINE_NAME"
          break
        fi
      done
      if [ -z "$PIPELINE_NAME" ]; then
        echo "Warning: No CodePipeline found after CloudFormation deployment"
        echo "Pipeline may still be creating. Deployment infrastructure is ready."
      else
        echo "Monitoring CodePipeline execution: $PIPELINE_NAME"
        echo "This may take several minutes to complete..."
        echo "Pipeline monitoring will check status every 15 seconds with keepalive output"

        # Monitor pipeline with timeout (3 hours max to accommodate long deployments)
        MAX_WAIT_TIME=10800  # 3 hours in seconds
        ELAPSED_TIME=0
        CHECK_INTERVAL=15
        STATUS_LOG_INTERVAL=60
        LAST_STATUS_LOG=0
        CREDENTIAL_REFRESH_INTERVAL=3000  # Refresh every 50 minutes (before 1-hour expiry)
        LAST_CREDENTIAL_REFRESH=0

        while [ $ELAPSED_TIME -lt $MAX_WAIT_TIME ]; do
          # Calculate elapsed time in minutes for display
          ELAPSED_MINUTES=$((ELAPSED_TIME / 60))

          # Refresh AWS credentials every 50 minutes to prevent expiration
          if [ $((ELAPSED_TIME - LAST_CREDENTIAL_REFRESH)) -ge $CREDENTIAL_REFRESH_INTERVAL ] && [ $ELAPSED_TIME -gt 0 ]; then
            echo ""
            echo "[${ELAPSED_MINUTES}m] Refreshing AWS credentials to prevent expiration..."
            refresh_credentials
            LAST_CREDENTIAL_REFRESH=$ELAPSED_TIME
          fi

          # Get pipeline execution status
          EXECUTION_STATUS=$(aws codepipeline list-pipeline-executions \
            --pipeline-name "$PIPELINE_NAME" \
            --profile default \
            --region $DEPLOY_REGION \
            --max-items 1 \
            --query "pipelineExecutionSummaries[0].status" \
            --output text 2>/dev/null | tr -d '\n\r' | sed 's/None//g' | xargs)

          if [ $? -ne 0 ] || [ "$EXECUTION_STATUS" == "None" ] || [ -z "$EXECUTION_STATUS" ] || [ "$EXECUTION_STATUS" == "null" ]; then
            # Keepalive output every check interval
            echo "[${ELAPSED_MINUTES}m] Waiting for pipeline execution to start..."
          else
            # Log full status every STATUS_LOG_INTERVAL seconds
            if [ $((ELAPSED_TIME - LAST_STATUS_LOG)) -ge $STATUS_LOG_INTERVAL ]; then
              echo "[${ELAPSED_MINUTES}m] Pipeline Status: $EXECUTION_STATUS ($(date '+%H:%M:%S'))"
              LAST_STATUS_LOG=$ELAPSED_TIME
            else
              # Keepalive dot every CHECK_INTERVAL seconds
              echo -n "."
            fi

            case "$EXECUTION_STATUS" in
              "Succeeded")
                echo ""
                echo "Pipeline completed successfully!"
                echo "MediaLake deployment completed successfully!"
                break
                ;;
              "Failed")
                echo ""
                echo "Pipeline failed!"
                echo "Pipeline execution failed. Check CodePipeline console for details."
                exit 1
                ;;
              "Stopped")
                echo ""
                echo "Pipeline was stopped!"
                echo "Pipeline execution was stopped."
                exit 1
                ;;
              "Stopping")
                # Continue monitoring
                :
                ;;
              "InProgress"|"IN_PROGRESS"|"In_Progress")
                # Continue monitoring
                :
                ;;
              "Superseded")
                echo ""
                echo "Pipeline was superseded by a newer execution..."
                echo "Pipeline execution was superseded."
                exit 1
                ;;
              *)
                # Check for failure patterns
                if [[ "$EXECUTION_STATUS" == *"FAILED"* ]] || [[ "$EXECUTION_STATUS" == *"Failed"* ]] || [[ "$EXECUTION_STATUS" == *"failed"* ]]; then
                  echo ""
                  echo "Pipeline appears to have failed (status: $EXECUTION_STATUS)"
                  exit 1
                fi
                ;;
            esac
          fi

          sleep $CHECK_INTERVAL
          ELAPSED_TIME=$((ELAPSED_TIME + CHECK_INTERVAL))
        done

        if [ $ELAPSED_TIME -ge $MAX_WAIT_TIME ]; then
          echo ""
          echo "Pipeline monitoring timed out after 3 hours"
          echo "Pipeline may still be running. Check CodePipeline console for current status."
          exit 1
        fi
      fi
    - echo "============================================="
    - echo "Extracting deployment information for E2E testing..."
    - echo "============================================="
    - |
      # Extract CloudFront URL from stack outputs
      CLOUDFRONT_URL=$(aws cloudformation describe-stacks \
        --stack-name $STACK_NAME \
        --region $DEPLOY_REGION \
        --profile default \
        --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionUrl'].OutputValue" \
        --output text)

      if [ -z "$CLOUDFRONT_URL" ]; then
        echo "Error: Could not find CloudFront URL in stack outputs"
        exit 1
      fi

      echo "CloudFront URL: $CLOUDFRONT_URL"
      export PLAYWRIGHT_BASE_URL="https://$CLOUDFRONT_URL"
      echo "PLAYWRIGHT_BASE_URL=$PLAYWRIGHT_BASE_URL"

      # Extract other useful outputs
      API_ENDPOINT=$(aws cloudformation describe-stacks \
        --stack-name $STACK_NAME \
        --region $DEPLOY_REGION \
        --profile default \
        --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
        --output text || echo "")

      echo "API Endpoint: $API_ENDPOINT"
    - echo "============================================"
    - echo "Setting up Playwright E2E tests..."
    - echo "============================================"
    - cd medialake_user_interface
    - echo "Installing Node.js dependencies..."
    - npm ci
    - echo "Installing Playwright browsers..."
    - npx playwright install --with-deps chromium
    - echo "============================================"
    - echo "Running Playwright E2E tests..."
    - echo "============================================"
    - |
      # Run Playwright tests with the deployed environment
      export CI=true
      export AWS_REGION=$DEPLOY_REGION
      export AWS_PROFILE=default

      echo "Starting Playwright tests against $PLAYWRIGHT_BASE_URL"
      echo "Test configuration:"
      echo "  - Base URL: $PLAYWRIGHT_BASE_URL"
      echo "  - AWS Region: $AWS_REGION"
      echo "  - AWS Profile: $AWS_PROFILE"

      # Create a temporary Playwright config that uses the CloudFront URL
      cat > playwright.ci.config.ts << 'EOF'
      import { defineConfig } from '@playwright/test';
      import baseConfig from './playwright.config';

      export default defineConfig({
        ...baseConfig,
        use: {
          ...baseConfig.use,
          baseURL: process.env.PLAYWRIGHT_BASE_URL || 'http://localhost:5173',
        },
        webServer: undefined, // Don't start local dev server in CI
      });
      EOF

      # Run tests with proper configuration
      npx playwright test \
        --config=playwright.ci.config.ts \
        --reporter=html \
        --reporter=junit \
        --project=chromium \
        tests/auth/login.spec.ts \
        tests/integration/ \
        || TEST_EXIT_CODE=$?

      # Store exit code but continue to show results
      if [ -n "$TEST_EXIT_CODE" ] && [ "$TEST_EXIT_CODE" -ne "0" ]; then
        echo "⚠️  Some Playwright tests failed (exit code: $TEST_EXIT_CODE)"
        echo "Test report available in playwright-report/"
      else
        echo "✅ All Playwright tests passed!"
      fi
    - cd ..
    - echo "============================================"
    - echo "Cleaning up deployment resources..."
    - echo "============================================"
    - refresh_credentials
    - |
      # Clean up: Delete the temporary S3 bucket after deployment
      echo "Cleaning up temporary S3 bucket..."
      aws s3 rm s3://$S3_BUCKET_NAME --recursive --region $DEPLOY_REGION --profile default
      aws s3 rb s3://$S3_BUCKET_NAME --region $DEPLOY_REGION --profile default
      echo "Temporary S3 bucket deleted: $S3_BUCKET_NAME"
    - |
      # Exit with test result code if tests failed
      if [ -n "$TEST_EXIT_CODE" ] && [ "$TEST_EXIT_CODE" -ne "0" ]; then
        echo "Failing job due to test failures"
        exit $TEST_EXIT_CODE
      fi
  artifacts:
    when: always
    paths:
      - medialake_user_interface/playwright-report/
      - medialake_user_interface/test-results/
    reports:
      junit: medialake_user_interface/test-results/junit.xml
    expire_in: 30 days
  after_script:
    - echo "E2E test execution completed"
    - echo "Test artifacts available in test-results/ and playwright-report/ directories"
