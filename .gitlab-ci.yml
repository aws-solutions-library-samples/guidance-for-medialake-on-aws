stages:
  - .pre
  - lint
  - build
  - release

default:
  image: public.ecr.aws/amazonlinux/amazonlinux:latest
  tags:
    - arch:amd64
    - size:large

variables:
  PROJECT_ENV: ${CI_COMMIT_REF_SLUG}
  AWS_CONFIG_FILE: ${CI_BUILDS_DIR}/.awscredentialvendor/config
  AWS_SHARED_CREDENTIALS_FILE: ${CI_BUILDS_DIR}/.awscredentialvendor/credentials
  GITHUB_REPO: "aws-solutions-library-samples/guidance-for-medialake-on-aws"
  GIT_DEPTH: "1"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip
    - node_modules/

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: never

.base_setup:
  before_script:
    - yum update -y
    - yum install -y python3 python3-pip python3-devel git jq unzip which findutils gcc tar gzip bash openssh-clients
    - curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
    - yum install -y nodejs
    - yum install -y atk at-spi2-atk cups-libs libdrm libxcb libxkbcommon at-spi2-core libX11 libXcomposite libXdamage libXext libXfixes libXrandr mesa-libgbm pango cairo alsa-lib
    - npm install -g prettier
    - npm --version
    - node --version
    - python3 --version
    - git --version

.pre_commit_template:
  extends: .base_setup
  script:
    - echo "Running pre-commit checks"
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install pre-commit autoflake isort black flake8
    - npm install
    - pre-commit run --all-files trailing-whitespace
    - pre-commit run --all-files end-of-file-fixer
    - pre-commit run --all-files check-yaml
    - pre-commit run --all-files check-added-large-files
    - pre-commit run --all-files check-merge-conflict
    - pre-commit run --all-files detect-private-key
    - pre-commit run --all-files check-json
    - pre-commit run --all-files autoflake
    - pre-commit run --all-files isort
    - pre-commit run --all-files black
    - pre-commit run --all-files flake8
    - pre-commit run --all-files prettier
    - find . -name .DS_Store -type f -delete

.frontend_build_template:
  extends: .base_setup
  script:
    - echo "Running frontend build"
    - cd medialake_user_interface
    - npm install
    - npm run build

mr-title-check:
  stage: .pre
  image: public.ecr.aws/docker/library/alpine:latest
  variables:
    GIT_DEPTH: "1"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
  script:
    - apk add --no-cache grep
    - |
      REGEX="^(revert|build|ci|docs|feat|fix|perf|refactor|release|style|test)(\([a-zA-Z0-9\-_.]+\))?(!)?: .+"
      TITLE="${CI_MERGE_REQUEST_TITLE}"
      echo "Validating MR title: ${TITLE}"
      if ! echo "${TITLE}" | grep -E "${REGEX}" > /dev/null; then
        echo "ERROR: MR title must follow Conventional Commits format"
        echo "Examples: feat(api): add new endpoint, fix: resolve bug"
        exit 1
      fi
      echo "MR title is valid"

pre_commit_checks_mr:
  stage: lint
  extends: .pre_commit_template
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

frontend_build_mr:
  stage: build
  extends: .frontend_build_template
  needs: []
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

pre_commit_checks_main:
  stage: lint
  extends: .pre_commit_template
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

frontend_build_main:
  stage: build
  extends: .frontend_build_template
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

release_manual:
  stage: release
  image: public.ecr.aws/amazonlinux/amazonlinux:latest
  variables:
    GIT_DEPTH: "0"
  needs:
    - job: pre_commit_checks_main
    - job: frontend_build_main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  allow_failure: false
  retry: 1
  timeout: 30m
  before_script:
    - yum update -y
    - yum install -y git jq tar gzip bash openssh-clients
    - curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
    - yum install -y nodejs
    - npm install -g prettier
    # gh CLI install — uncomment when GITHUB_TOKEN is available
    # - |
    #   ARCH="$(uname -m)"
    #   case "$ARCH" in
    #     x86_64) GH_ARCH="amd64" ;;
    #     aarch64) GH_ARCH="arm64" ;;
    #     *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
    #   esac
    #   GH_VERSION="2.72.0" # review periodically
    #   curl -L "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${GH_ARCH}.tar.gz" -o /tmp/gh.tgz
    #   tar -xzf /tmp/gh.tgz -C /tmp
    #   mv /tmp/gh_${GH_VERSION}_linux_${GH_ARCH}/bin/gh /usr/local/bin/gh
    #   chmod +x /usr/local/bin/gh
    - git config --global user.email "medialake@amazon.com"
    - git config --global user.name "Media Lake CI"
    - |
      if [ -z "${GITLAB_PUSH_TOKEN}" ]; then
        echo "ERROR: GITLAB_PUSH_TOKEN is required"
        exit 1
      fi
    - git remote set-url origin "https://gitlab-ci-token:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --tags origin
    - git fetch origin main:main
    - eval "$(ssh-agent -s)"
    - echo "${GITHUB_SSH_PRIVATE_KEY}" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    # Uncomment when GITHUB_TOKEN is available
    # - |
    #   if [ -z "${GITHUB_TOKEN}" ]; then
    #     echo "ERROR: GITHUB_TOKEN is required"
    #     exit 1
    #   fi
    # - export GITHUB_TOKEN="${GITHUB_TOKEN}"
  script:
    - |
      cat > /tmp/release_and_publish.sh <<'SCRIPT_EOF'
      #!/bin/bash
      set -euo pipefail

      FS=$'\x1f'
      RS=$'\x1e'

      git checkout main
      git pull --ff-only origin main

      REAL_LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
      LAST_VERSION="0.0.0"

      if [ -n "${REAL_LAST_TAG}" ]; then
        LAST_VERSION="${REAL_LAST_TAG#v}"
      fi

      IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_VERSION}"

      if [ -n "${REAL_LAST_TAG}" ]; then
        COMMIT_STREAM="$(git log "${REAL_LAST_TAG}..main" --pretty=format:"%H${FS}%s${FS}%b${RS}")"
      else
        COMMIT_STREAM="$(git log main --pretty=format:"%H${FS}%s${FS}%b${RS}")"
      fi

      if [ -z "${COMMIT_STREAM}" ]; then
        echo "No new commits since last release; nothing to release."
        exit 0
      fi

      dedupe() {
        awk '!seen[$0]++' | sed '/^$/d'
      }

      BUMP_TYPE="none"
      BREAKING_CHANGES=""
      FEATURES=""
      FIXES=""
      REFACTORS=""
      PERFORMANCES=""
      OTHERS=""

      while IFS= read -r -d "$RS" RECORD; do
        [ -z "${RECORD}" ] && continue

        HASH="${RECORD%%${FS}*}"
        REST="${RECORD#*${FS}}"
        SUBJECT="${REST%%${FS}*}"
        BODY="${REST#*${FS}}"
        FULL_MESSAGE="${SUBJECT}"$'\n'"${BODY}"

        if [[ "${SUBJECT}" =~ ^[a-z]+(\([a-zA-Z0-9_.+-]+\))?!:[[:space:]] ]] || [[ "${FULL_MESSAGE}" =~ BREAKING[[:space:]]CHANGE: ]]; then
          BUMP_TYPE="major"
          BREAKING_CHANGES="${BREAKING_CHANGES}- ${SUBJECT}"$'\n'
        elif [[ "${SUBJECT}" =~ ^feat(\([a-zA-Z0-9_.+-]+\))?: ]]; then
          [ "${BUMP_TYPE}" != "major" ] && BUMP_TYPE="minor"
          FEATURES="${FEATURES}- ${SUBJECT}"$'\n'
        elif [[ "${SUBJECT}" =~ ^fix(\([a-zA-Z0-9_.+-]+\))?: ]]; then
          [ "${BUMP_TYPE}" = "none" ] && BUMP_TYPE="patch"
          FIXES="${FIXES}- ${SUBJECT}"$'\n'
        elif [[ "${SUBJECT}" =~ ^refactor(\([a-zA-Z0-9_.+-]+\))?: ]]; then
          [ "${BUMP_TYPE}" = "none" ] && BUMP_TYPE="patch"
          REFACTORS="${REFACTORS}- ${SUBJECT}"$'\n'
        elif [[ "${SUBJECT}" =~ ^perf(\([a-zA-Z0-9_.+-]+\))?: ]]; then
          [ "${BUMP_TYPE}" = "none" ] && BUMP_TYPE="patch"
          PERFORMANCES="${PERFORMANCES}- ${SUBJECT}"$'\n'
        elif [[ "${SUBJECT}" =~ ^test(\([a-zA-Z0-9_.+-]+\))?: ]]; then
          [ "${BUMP_TYPE}" = "none" ] && BUMP_TYPE="patch"
          OTHERS="${OTHERS}- ${SUBJECT}"$'\n'
        elif [[ "${SUBJECT}" =~ ^(build|style|docs|ci|chore|release)(\([a-zA-Z0-9_.+-]+\))?: ]]; then
          OTHERS="${OTHERS}- ${SUBJECT}"$'\n'
        else
          OTHERS="${OTHERS}- ${SUBJECT}"$'\n'
        fi
      done < <(printf '%s' "${COMMIT_STREAM}")

      BREAKING_CHANGES="$(printf "%s" "${BREAKING_CHANGES}" | dedupe || true)"
      FEATURES="$(printf "%s" "${FEATURES}" | dedupe || true)"
      FIXES="$(printf "%s" "${FIXES}" | dedupe || true)"
      REFACTORS="$(printf "%s" "${REFACTORS}" | dedupe || true)"
      PERFORMANCES="$(printf "%s" "${PERFORMANCES}" | dedupe || true)"
      OTHERS="$(printf "%s" "${OTHERS}" | dedupe || true)"

      if [ "${BUMP_TYPE}" = "none" ]; then
        echo "No semver-bumping changes found; exiting."
        exit 0
      fi

      case "${BUMP_TYPE}" in
        major)
          MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
        minor)
          MINOR=$((MINOR + 1)); PATCH=0 ;;
        patch)
          PATCH=$((PATCH + 1)) ;;
      esac

      NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
      NEW_TAG="v${NEW_VERSION}"

      CHANGELOG_ENTRY="## [${NEW_VERSION}] - $(date +%Y-%m-%d)"$'\n\n'
      [ -n "${BREAKING_CHANGES}" ] && CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### BREAKING CHANGES"$'\n\n'"${BREAKING_CHANGES}"$'\n\n'
      [ -n "${FEATURES}" ] && CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Features"$'\n\n'"${FEATURES}"$'\n\n'
      [ -n "${FIXES}" ] && CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Bug Fixes"$'\n\n'"${FIXES}"$'\n\n'
      [ -n "${PERFORMANCES}" ] && CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Performance Improvements"$'\n\n'"${PERFORMANCES}"$'\n\n'
      [ -n "${REFACTORS}" ] && CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Code Refactoring"$'\n\n'"${REFACTORS}"$'\n\n'
      [ -n "${OTHERS}" ] && CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Other Changes"$'\n\n'"${OTHERS}"$'\n\n'

      if [ -f CHANGELOG.md ]; then
        TMP_FILE="$(mktemp)"
        FIRST_LINE="$(head -n 1 CHANGELOG.md || true)"
        if [ "${FIRST_LINE}" = "# Changelog" ]; then
          {
            echo "# Changelog"
            echo
            printf "%s" "${CHANGELOG_ENTRY}"
            tail -n +2 CHANGELOG.md
          } > "${TMP_FILE}"
        else
          {
            echo "# Changelog"
            echo
            printf "%s" "${CHANGELOG_ENTRY}"
            cat CHANGELOG.md
          } > "${TMP_FILE}"
        fi
        mv "${TMP_FILE}" CHANGELOG.md
      else
        {
          echo "# Changelog"
          echo
          printf "%s" "${CHANGELOG_ENTRY}"
        } > CHANGELOG.md
      fi

      sed -i 's/[[:space:]]*$//' CHANGELOG.md
      if [ -n "$(tail -c 1 CHANGELOG.md)" ]; then
        echo >> CHANGELOG.md
      fi
      prettier --write CHANGELOG.md || true

      git add CHANGELOG.md
      git commit -m "chore(release): ${NEW_TAG} [skip ci]"

      {
        echo "Release ${NEW_VERSION}"
        echo
        printf "%s" "${CHANGELOG_ENTRY}"
      } > /tmp/tag_message.txt

      git tag -a "${NEW_TAG}" -F /tmp/tag_message.txt

      git push origin main "${NEW_TAG}"

      if ! git show-ref --verify --quiet refs/heads/latest-release; then
        git branch latest-release "${NEW_TAG}"
      else
        git branch -f latest-release "${NEW_TAG}"
      fi
      git push --force origin latest-release

      awk -v ver="${NEW_VERSION}" '
        $0 ~ "^## \\[" ver "\\]" {capture=1}
        capture {
          if (started && $0 ~ "^## \\[") exit
          print
          started=1
        }
      ' CHANGELOG.md > /tmp/github_release_notes.md

      if [ ! -s /tmp/github_release_notes.md ]; then
        cp /tmp/tag_message.txt /tmp/github_release_notes.md
      fi

      # Mirror to GitHub (fatal — repos must stay in sync)
      if ! git remote | grep -q '^github$'; then
        git remote add github "git@github.com:${GITHUB_REPO}.git"
      fi

      git push github main "${NEW_TAG}" --force
      git push --force github latest-release

      echo "Published ${NEW_TAG} to GitLab and GitHub."

      # GitHub release creation — uncomment when GITHUB_TOKEN is available
      # if gh release view "${NEW_TAG}" --repo "${GITHUB_REPO}" >/dev/null 2>&1; then
      #   gh release edit "${NEW_TAG}" \
      #     --repo "${GITHUB_REPO}" \
      #     --title "${NEW_TAG}" \
      #     --notes-file /tmp/github_release_notes.md
      # else
      #   gh release create "${NEW_TAG}" \
      #     --repo "${GITHUB_REPO}" \
      #     --title "${NEW_TAG}" \
      #     --notes-file /tmp/github_release_notes.md
      # fi

      SCRIPT_EOF
    - bash /tmp/release_and_publish.sh
  after_script:
    - eval "$(ssh-agent -k)" 2>/dev/null || true
