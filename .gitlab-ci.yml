stages:
  - lint
  - deploy
  - test

default:
  image: public.ecr.aws/amazonlinux/amazonlinux:latest
  tags:
    - arch:amd64
    - size:large

# Variables
variables:
  PROJECT_ENV: $CI_COMMIT_REF_SLUG
  AWS_CONFIG_FILE: $CI_BUILDS_DIR/.awscredentialvendor/config
  AWS_SHARED_CREDENTIALS_FILE: $CI_BUILDS_DIR/.awscredentialvendor/credentials
  # Default deployment environment
  INITIAL_USER_EMAIL: $DEFAULT_INITIAL_USER_EMAIL
  AWS_CREDS_TARGET_ROLE: $DEFAULT_AWS_IAM_ROLE
  AWS_DEFAULT_ACCOUNT: $DEFAULT_AWS_ACCOUNT_ID
  CDK_DEPLOY_ACCOUNT: $DEFAULT_AWS_ACCOUNT_ID
  CDK_DEFAULT_ACCOUNT: $DEFAULT_AWS_ACCOUNT_ID
  AWS_DEFAULT_REGION: $DEFAULT_AWS_REGION
  CDK_DEPLOY_REGION: $DEFAULT_AWS_REGION
  AWS_REGION: $DEFAULT_AWS_REGION
  AMAZON_REGION: $DEFAULT_AWS_REGION

workflow:
  rules:
    - if: $CI_COMMIT_REF_NAME == "dev4"
      variables:
        INITIAL_USER_EMAIL: $DEV4_INITIAL_USER_EMAIL
        AWS_CREDS_TARGET_ROLE: $DEV4_AWS_IAM_ROLE
        AWS_DEFAULT_ACCOUNT: $DEV4_AWS_ACCOUNT_ID
        CDK_DEPLOY_ACCOUNT: $DEV4_AWS_ACCOUNT_ID
        CDK_DEFAULT_ACCOUNT: $DEV4_AWS_ACCOUNT_ID
        AWS_DEFAULT_REGION: $DEV4_AWS_REGION
        CDK_DEPLOY_REGION: $DEV4_AWS_REGION
        AWS_REGION: $DEV4_AWS_REGION
        AMAZON_REGION: $DEV4_AWS_REGION
    - if: $CI_COMMIT_REF_NAME == "dev5"
      variables:
        INITIAL_USER_EMAIL: $DEV5_INITIAL_USER_EMAIL
        AWS_CREDS_TARGET_ROLE: $DEV5_AWS_IAM_ROLE
        AWS_DEFAULT_ACCOUNT: $DEV5_AWS_ACCOUNT_ID
        CDK_DEPLOY_ACCOUNT: $DEV5_AWS_ACCOUNT_ID
        CDK_DEFAULT_ACCOUNT: $DEV5_AWS_ACCOUNT_ID
        AWS_DEFAULT_REGION: $DEV5_AWS_REGION
        CDK_DEPLOY_REGION: $DEV5_AWS_REGION
        AWS_REGION: $DEV5_AWS_REGION
        AMAZON_REGION: $DEV5_AWS_REGION
    - if: $CI_COMMIT_REF_NAME == "demo"
      variables:
        INITIAL_USER_EMAIL: $DEMO_INITIAL_USER_EMAIL
        AWS_CREDS_TARGET_ROLE: $DEMO_AWS_IAM_ROLE
        AWS_DEFAULT_ACCOUNT: $DEMO_AWS_ACCOUNT_ID
        CDK_DEPLOY_ACCOUNT: $DEMO_AWS_ACCOUNT_ID
        CDK_DEFAULT_ACCOUNT: $DEMO_AWS_ACCOUNT_ID
        AWS_DEFAULT_REGION: $DEMO_AWS_REGION
        CDK_DEPLOY_REGION: $DEMO_AWS_REGION
        AWS_REGION: $DEMO_AWS_REGION
        AMAZON_REGION: $DEMO_AWS_REGION
    - if: $CI_COMMIT_REF_NAME == "stable"
      variables:
        AWS_CREDS_TARGET_ROLE: $US_WEST_2_AWS_IAM_ROLE
        AWS_DEFAULT_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
        CDK_DEPLOY_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
        CDK_DEFAULT_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
        AWS_DEFAULT_REGION: $US_WEST_2_AWS_REGION
        CDK_DEPLOY_REGION: $US_WEST_2_AWS_REGION
        AWS_REGION: $US_WEST_2_AWS_REGION
        AMAZON_REGION: $US_WEST_2_AWS_REGION
    # Allow merge requests targeting stable to use US West 2 variables
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      variables:
        AWS_CREDS_TARGET_ROLE: $US_WEST_2_AWS_IAM_ROLE
        AWS_DEFAULT_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
        CDK_DEPLOY_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
        CDK_DEFAULT_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
        AWS_DEFAULT_REGION: $US_WEST_2_AWS_REGION
        CDK_DEPLOY_REGION: $US_WEST_2_AWS_REGION
        AWS_REGION: $US_WEST_2_AWS_REGION
        AMAZON_REGION: $US_WEST_2_AWS_REGION
    # Allow merge requests to run
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never

# Cache modules in between jobs
cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .cache/pip

.echo_versions: &echo_versions
  before_script:
    # Install required dependencies
    - yum update -y
    - yum install -y python3 python3-pip nodejs npm git jq unzip which findutils
    # Install AWS CLI
    - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    - unzip awscliv2.zip
    - ./aws/install
    # Install AWS CDK
    - npm install -g aws-cdk
    - echo "login = $GITLAB_USER_LOGIN - role = $AWS_CREDS_TARGET_ROLE"
    - npm --version
    - node --version
    - aws --version
    - cdk --version
    - jq --version

job_deploy:
  stage: deploy
  <<: *echo_versions
  rules:
    - if: $CI_COMMIT_REF_NAME == "stable"
      when: on_success
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never # This prevents the job from running for other branches
  script:
    - echo "Deploying the project"
    - mv .cicd/config.json-template config.json
    - echo "$( jq --arg e "$PROJECT_ENV" '.environment = $e' config.json )" > config.json
    - echo "$( jq --arg a "$CDK_DEPLOY_ACCOUNT" '.account_id = $a' config.json )" > config.json
    - echo "$( jq --arg r "$AWS_REGION" '.primary_region = $r' config.json )" > config.json
    - echo "$( jq --arg u "$INITIAL_USER_EMAIL" '.initial_user.email = $u' config.json )" > config.json
    - cat config.json
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - npm install
    - python3 .cicd/build_lambdas.py build
    - bash .cicd/build_ffprobe.sh
    - bash .cicd/build_ffmpeg.sh
    - bash .cicd/build_resvg.sh
    - cdk bootstrap
    - cdk deploy --all --require-approval never

# CloudFormation deployment job for DEV1 account
job_deploy_cf_dev1:
  stage: deploy
  <<: *echo_versions
  rules:
    - if: $CI_COMMIT_REF_NAME == "stable"
      when: on_success
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never # This prevents the job from running for other branches
  variables:
    STACK_NAME: "medialake-cf-dev1"
    ZIP_FILE_NAME: "medialake-source-${CI_COMMIT_SHORT_SHA}.zip"
  script:
    - echo "Deploying MediaLake to DEV1 account via CloudFormation"
    - echo "Using CICD Account ID: $CICD_ACCOUNT_ID"
    - echo "Using CICD IAM Role: $CICD_IAM_ROLE"
    - echo "Using CICD S3 Bucket: $CICD_S3_BUCKET"
    # Configure AWS credentials for CICD account
    - export AWS_DEFAULT_REGION=us-east-1
    - export AWS_REGION=us-east-1
    - aws sts assume-role --role-arn "arn:aws:iam::${CICD_ACCOUNT_ID}:role/${CICD_IAM_ROLE}" --role-session-name "gitlab-ci-deploy" > assume-role-output.json
    - export AWS_ACCESS_KEY_ID=$(jq -r '.Credentials.AccessKeyId' assume-role-output.json)
    - export AWS_SECRET_ACCESS_KEY=$(jq -r '.Credentials.SecretAccessKey' assume-role-output.json)
    - export AWS_SESSION_TOKEN=$(jq -r '.Credentials.SessionToken' assume-role-output.json)
    # Delete existing CloudFormation stack if it exists
    - echo "Checking for existing CloudFormation stack: $STACK_NAME"
    - >
      if aws cloudformation describe-stacks --stack-name $STACK_NAME --region us-east-1 2>/dev/null; then
        echo "Stack $STACK_NAME exists, deleting it...";
        aws cloudformation delete-stack --stack-name $STACK_NAME --region us-east-1;
        echo "Waiting for stack deletion to complete...";
        aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME --region us-east-1;
        echo "Stack $STACK_NAME deleted successfully";
      else
        echo "Stack $STACK_NAME does not exist, proceeding with deployment";
      fi
    # Create zip file of the repository
    - echo "Creating zip file of repository..."
    - zip -r $ZIP_FILE_NAME . -x "*.git*" "*.venv*" "*__pycache__*" "*.pyc" "*node_modules*" "*.DS_Store*"
    - ls -la $ZIP_FILE_NAME
    # Upload zip file to S3 bucket
    - echo "Uploading zip file to S3 bucket: $CICD_S3_BUCKET"
    - aws s3 cp $ZIP_FILE_NAME s3://$CICD_S3_BUCKET/$ZIP_FILE_NAME --region us-east-1
    # Generate pre-signed URL for the uploaded zip file
    - echo "Generating pre-signed URL for zip file..."
    - PRESIGNED_URL=$(aws s3 presign s3://$CICD_S3_BUCKET/$ZIP_FILE_NAME --expires-in 3600 --region us-east-1)
    - echo "Pre-signed URL generated successfully"
    # Deploy CloudFormation stack using medialake.template
    - echo "Deploying CloudFormation stack: $STACK_NAME"
    - >
      aws cloudformation create-stack
      --stack-name $STACK_NAME
      --template-body file://medialake.template
      --parameters ParameterKey=SourceCodeUrl,ParameterValue="$PRESIGNED_URL"
      --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM
      --region us-east-1
    # Wait for stack creation to complete
    - echo "Waiting for stack creation to complete..."
    - aws cloudformation wait stack-create-complete --stack-name $STACK_NAME --region us-east-1
    - echo "CloudFormation deployment completed successfully"
    # Get stack outputs
    - echo "Stack outputs:"
    - aws cloudformation describe-stacks --stack-name $STACK_NAME --region us-east-1 --query 'Stacks[0].Outputs'

# Pre-commit hooks job for merge requests to main (excluding ESLint)
pre_commit_checks:
  stage: lint
  <<: *echo_versions
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
  script:
    - echo "Running pre-commit checks for merge request to main"
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install pre-commit
    - npm install
    # Install additional dependencies for pre-commit hooks
    - pip install autoflake isort black flake8
    - npm install -g prettier
    # Run pre-commit hooks excluding ESLint
    - pre-commit run --all-files trailing-whitespace
    - pre-commit run --all-files end-of-file-fixer
    - pre-commit run --all-files check-yaml
    - pre-commit run --all-files check-added-large-files
    - pre-commit run --all-files check-merge-conflict
    - pre-commit run --all-files detect-private-key
    - pre-commit run --all-files check-json
    - pre-commit run --all-files autoflake
    - pre-commit run --all-files isort
    - pre-commit run --all-files black
    - pre-commit run --all-files flake8
    - pre-commit run --all-files prettier
    - find . -name .DS_Store -type f -delete

sync-to-github:
  image: alpine:latest
  stage: deploy
  rules:
    - if: $CI_COMMIT_REF_NAME == "release"
  script:
    - apk add --no-cache git openssh
    - mkdir -p ~/.ssh
    - echo "$GITHUB_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config --global user.email "medialake@amazon.com"
    - git config --global user.name "MediaLake CI"
    - git clone --single-branch --branch release $CI_REPOSITORY_URL repo-copy
    - cd repo-copy
    - RELEASE_COMMIT_MESSAGE=$(git log -1 --pretty=format:"%s")
    - echo "Release commit message $RELEASE_COMMIT_MESSAGE"
    - echo "Current commit" && git log --oneline -1
    - echo "Current branch" && git branch -a
    - git remote add github git@github.com:aws-solutions-library-samples/guidance-for-medialake-on-aws.git
    - git fetch github main
    - echo "GitHub main commit" && git log --oneline -1 github/main
    - rm -f secrets.txt
    - rm -rf docs/
    - rm -rf .roo/
    - rm -f setup-dev.sh
    - rm -f manage-hooks.sh
    - rm -f fix.sh
    - rm -f .roomodes
    - rm -f .pre-commit-config.yaml
    - rm -rf .githooks/
    - git add -A
    - git commit -m "$RELEASE_COMMIT_MESSAGE" --allow-empty
    - git push -f github HEAD:main
