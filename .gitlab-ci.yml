# Pre-commit hooks job for merge requests to main (excluding ESLint)
pre_commit_checks:
  stage: lint
  <<: *echo_versions
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
  script:
    - echo "Running pre-commit checks for merge request to main"
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install pre-commit
    - npm install
    # Install additional dependencies for pre-commit hooks
    - pip install autoflake isort black flake8
    - npm install -g prettier
    # Run pre-commit hooks excluding ESLint
    - pre-commit run --all-files trailing-whitespace
    - pre-commit run --all-files end-of-file-fixer
    - pre-commit run --all-files check-yaml
    - pre-commit run --all-files check-added-large-files
    - pre-commit run --all-files check-merge-conflict
    - pre-commit run --all-files detect-private-key
    - pre-commit run --all-files check-json
    - pre-commit run --all-files autoflake
    - pre-commit run --all-files isort
    - pre-commit run --all-files black
    - pre-commit run --all-files flake8
    - pre-commit run --all-files prettier
    - find . -name .DS_Store -type f -delete

sync-to-github:
  image: alpine:latest
  stage: deploy
  rules:
    - if: $CI_COMMIT_REF_NAME == "release"
  script:
    - apk add --no-cache git openssh rsync
    - mkdir -p ~/.ssh
    - echo "$GITHUB_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config --global user.email "medialake@amazon.com"
    - git config --global user.name "Media Lake CI"
    # Extract MR title from the merge commit body (it's on line 3 of the merge commit)
    - 'echo "Debug - Full commit message:"'
    - git log -1 --pretty=%B
    - 'echo "Debug - Extracting line 3..."'
    - 'export COMMIT_MESSAGE=$(git log -1 --pretty=%B | sed -n "3p" | xargs)'
    - 'echo "Debug - Extracted message: [${COMMIT_MESSAGE}]"'
    # Fallback to commit title if extraction fails or is empty
    - 'if [ -z "$COMMIT_MESSAGE" ]; then export COMMIT_MESSAGE="${CI_COMMIT_TITLE}"; fi'
    - 'echo "Final commit message for GitHub: ${COMMIT_MESSAGE}"'
    # Clone GitHub repository to maintain its git history
    - git clone git@github.com:aws-solutions-library-samples/guidance-for-medialake-on-aws.git github-repo
    - cd github-repo
    - 'echo "Current GitHub main commit:" && git log --oneline -1'
    # Copy all files from GitLab workspace (excluding .git) and delete files that do not exist in GitLab
    - rsync -av --delete --exclude=.git ../ ./
    # Remove files that shouldn't be in the public GitHub repository
    - rm -f secrets.txt
    - rm -f .roomodes
    - rm -rf .sonar/
    - rm -rf docs/
    - rm -rf .roo/
    - rm -rf .kiro/
    - rm -rf github-repo/
    - rm -rf .traycer/
    - rm -rf INTERNAL-ai-documentation/
    - rm -rf AUTHORIZATION_FIX.md
    - rm -rf memory-bank/
    - rm -rf cdk-test-output/
    - rm -rf design/
    - rm -f setup-dev.sh
    - rm -f manage-hooks.sh
    - rm -f .gitleaksignore
    - rm -f fix.sh
    - rm -f PERFORMANCE_OPTIMIZATION.md
    - rm -rf tests/
    - rm -rf scripts/
    - rm -f .roomodes
    - rm -f .pre-commit-config.yaml
    - rm -f .secrets.baseline
    - rm -f .gitlab-ci.yml
    - rm -f .gitattributes
    - rm -f .flake8
    - rm -rf .githooks/
    - rm -rf medialake_user_interface/test-results/
    - rm -rf medialake_user_interface/playwright-report/
    # Stage all changes and commit with the MR title
    - git add -A
    - 'git commit --allow-empty -m "${COMMIT_MESSAGE}"'
    - 'echo "New commit created:" && git log --oneline -1'
    # Push to GitHub main branch
    - git push origin main

# Shared variables for all E2E test jobs
.e2e_variables: &e2e_variables
  AWS_CREDS_TARGET_ROLE: $US_WEST_2_AWS_IAM_ROLE
  TARGET_ROLE: $US_WEST_2_AWS_IAM_ROLE
  AWS_DEFAULT_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
  AWS_DEFAULT_REGION: $US_WEST_2_AWS_REGION
  DEPLOY_REGION: $US_WEST_2_AWS_REGION
  CDK_DEPLOY_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
  CDK_DEFAULT_ACCOUNT: $US_WEST_2_AWS_ACCOUNT_ID
  CDK_DEPLOY_REGION: $US_WEST_2_AWS_REGION
  STACK_PREFIX: "medialake"
  STACK_NAME: "medialake-e2e-test"
  ENVIRONMENT_NAME: "e2e"
  DEPLOYMENT_SIZE: "small"
  ZIP_FILE_NAME: "medialake-source-${CI_COMMIT_SHORT_SHA}.zip"

# Shared before_script for basic AWS setup
.e2e_aws_setup: &e2e_aws_setup
  before_script:
    - echo "============================================"
    - echo "Job Start Time:$(date '+%Y-%m-%d %H:%M:%S %Z')"
    - echo "Job Timeout Configuration:4 hours"
    - echo "CI_JOB_TIMEOUT:$CI_JOB_TIMEOUT"
    - echo "Checking for potential timeout issues..."
    - echo "============================================"
    # Install required dependencies
    - yum update -y
    - yum install -y python3 python3-pip unzip which findutils zip
    # Install Node.js (required for Playwright)
    - curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
    - yum install -y nodejs
    - node --version
    - npm --version
    # Install AWS CLI
    - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    - unzip awscliv2.zip
    - ./aws/install
    # Configure AWS credentials for test execution
    # - aws configure set aws_access_key_id $ACCESS_KEY_ID
    # - aws configure set aws_secret_access_key $SECRET_ACCESS_KEY
    # - aws configure set default.region $DEPLOY_REGION
    - echo "AWS credentials configured for testing in region $DEPLOY_REGION"
    - cat $AWS_SHARED_CREDENTIALS_FILE
    - echo $AWS_CREDS_TARGET_ROLE
    - echo $AWS_DEFAULT_ACCOUNT
    - echo $AWS_DEFAULT_REGION
    - echo $DEPLOY_REGION
    - echo $CDK_DEPLOY_ACCOUNT
    - echo $CDK_DEFAULT_ACCOUNT
    - echo $CDK_DEPLOY_REGION
    - echo "Environment credentials overridden for testing"
    # Verify AWS access
    - cat /root/.aws/credentials
    - cat /root/.aws/config
    - whoami
    - aws s3 ls --profile default
    - aws sts get-caller-identity --profile default
    - echo "AWS identity verified for testing"
# ==============================================================================
# E2E TEST PIPELINE - SPLIT INTO MULTIPLE JOBS (EACH < 1 HOUR)
# ==============================================================================
# This replaces the single monolithic playwright_e2e_test job
# Each job completes within 1 hour to avoid credential/timeout issues
# ==============================================================================

# Job 1: Start infrastructure cleanup and monitor (first 50 minutes)
e2e_01_start_cleanup:
  stage: test
  timeout: 1h
  tags:
    - arch:amd64
    - size:large
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never
  variables:
    <<: *e2e_variables
  <<: *e2e_aws_setup
  script:
    - echo "Step 1 Starting cleanup of existing MediaLake E2E test infrastructure..."
    - |
      # Save regions for next job
      echo "$DEPLOY_REGION" > cleanup_region.txt

      # Function to list all matching stacks
      list_stacks() {
        local region=$1
        local stack_prefix="$STACK_PREFIX"
        aws cloudformation list-stacks \
          --region $region \
          --profile default \
          --stack-status-filter CREATE_COMPLETE CREATE_FAILED CREATE_IN_PROGRESS REVIEW_IN_PROGRESS ROLLBACK_COMPLETE ROLLBACK_FAILED ROLLBACK_IN_PROGRESS UPDATE_COMPLETE UPDATE_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_IN_PROGRESS UPDATE_ROLLBACK_COMPLETE UPDATE_ROLLBACK_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_ROLLBACK_FAILED UPDATE_ROLLBACK_IN_PROGRESS DELETE_FAILED \
          --query "StackSummaries[].StackName" \
          --output text | tr '\t' '\n' | grep -i "$stack_prefix" || true
      }

      # Function to check if any stacks are being deleted
      any_deleting() {
        local region=$1
        local stack_prefix="$STACK_PREFIX"
        local deleting_stacks=$(aws cloudformation list-stacks \
          --region $region \
          --profile default \
          --stack-status-filter DELETE_IN_PROGRESS \
          --query "StackSummaries[].StackName" \
          --output text | tr '\t' '\n' | grep -i "$stack_prefix" || true)
        if [ -z "$deleting_stacks" ]; then
          return 1
        else
          echo "Stacks currently being deleted in $region: $deleting_stacks"
          return 0
        fi
      }

      # Function to delete stacks in a specific region (with time limit)
      delete_stacks_with_monitoring() {
        local region=$1
        local max_minutes=50
        local start_time=$(date +%s)

        echo "Starting comprehensive stack cleanup in region $region"
        echo "Will monitor for up to $max_minutes minutes"
        echo "Will delete all stacks containing (case-insensitive): '$STACK_PREFIX'"

        local iteration=0
        while true; do
          iteration=$((iteration + 1))
          local current_time=$(date +%s)
          local elapsed_minutes=$(( (current_time - start_time) / 60 ))

          echo "Cleanup iteration $iteration (elapsed: ${elapsed_minutes} minutes)"

          # Check if we're approaching time limit
          if [ $elapsed_minutes -ge $max_minutes ]; then
            echo "Reached ${max_minutes}-minute monitoring limit"
            echo "Checking if cleanup is complete or needs continuation..."

            stacks=$(list_stacks "$region")
            if [ -z "$stacks" ]; then
              echo "cleanup_status=complete" > cleanup_status.txt
              echo "All stacks cleaned up successfully!"
              return 0
            else
              echo "cleanup_status=in_progress" > cleanup_status.txt
              echo "Cleanup still in progress. Will continue in next job."
              return 0
            fi
          fi

          stacks=$(list_stacks "$region")
          if [ -z "$stacks" ]; then
            echo "cleanup_status=complete" > cleanup_status.txt
            echo "No more medialake stacks found in region $region. Cleanup complete!"
            return 0
          fi

          echo "Found stacks in $region: $stacks"

          # Check if any stack is already being deleted
          if any_deleting "$region"; then
            echo "Waiting for in-progress deletions to complete in $region..."
          else
            # Attempt to delete each stack
            for stack in $stacks; do
              echo "Attempting to delete stack: $stack in region $region"
              stack_status=$(aws cloudformation describe-stacks --stack-name "$stack" --region "$region" --profile default --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "STACK_NOT_FOUND")
              if [ "$stack_status" == "DELETE_FAILED" ]; then
                echo "Stack $stack is in DELETE_FAILED state. Attempting to get resources that failed to delete..."
                resources=$(aws cloudformation list-stack-resources --stack-name "$stack" --region "$region" --profile default --query "StackResourceSummaries[?ResourceStatus=='DELETE_FAILED'].LogicalResourceId" --output text || true)
                if [ -n "$resources" ]; then
                  echo "Found resources that failed to delete: $resources"
                  echo "Attempting to delete stack with --retain-resources option"
                  aws cloudformation delete-stack \
                    --region $region \
                    --profile default \
                    --stack-name $stack \
                    --retain-resources $resources || true
                else
                  aws cloudformation delete-stack \
                    --region $region \
                    --profile default \
                    --stack-name $stack || true
                fi
              else
                aws cloudformation delete-stack \
                  --region $region \
                  --profile default \
                  --stack-name $stack || true
              fi
              break
            done
          fi

          echo "Waiting 60 seconds before checking again in $region..."
          sleep 60
        done
      }

      # Delete stacks in us-east-1 first
      delete_stacks_with_monitoring "us-east-1"

      # Check if we need to continue with deploy region
      if [ "$DEPLOY_REGION" != "us-east-1" ]; then
        cleanup_status=$(cat cleanup_status.txt | cut -d'=' -f2)
        if [ "$cleanup_status" == "complete" ]; then
          echo "Checking for regional resources in $DEPLOY_REGION..."
          delete_stacks_with_monitoring "$DEPLOY_REGION"
        else
          echo "Time limit reached. Regional cleanup will continue in next job."
        fi
      fi

      echo "First cleanup phase completed!"
  artifacts:
    paths:
      - cleanup_status.txt
      - cleanup_region.txt
    expire_in: 1 day

# Job 2: Continue cleanup monitoring if needed (second 50 minutes)
e2e_02_continue_cleanup:
  stage: test
  timeout: 1h
  tags:
    - arch:amd64
    - size:large
  needs:
    - job: e2e_01_start_cleanup
      artifacts: true
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never
  variables:
    <<: *e2e_variables
  <<: *e2e_aws_setup
  script:
    - echo "Step 2 Continuing cleanup monitoring if needed..."
    - export DEPLOY_REGION=$(cat cleanup_region.txt)
    - export CLEANUP_STATUS=$(cat cleanup_status.txt | cut -d'=' -f2)
    - |
      if [ "$CLEANUP_STATUS" == "complete" ]; then
        echo "Cleanup already completed in previous job. Skipping."
        echo "cleanup_status=complete" > cleanup_status.txt
        exit 0
      fi

      echo "Cleanup still in progress. Continuing monitoring..."

      # Function to list all matching stacks
      list_stacks() {
        local region=$1
        local stack_prefix="$STACK_PREFIX"
        aws cloudformation list-stacks \
          --region $region \
          --profile default \
          --stack-status-filter CREATE_COMPLETE CREATE_FAILED CREATE_IN_PROGRESS REVIEW_IN_PROGRESS ROLLBACK_COMPLETE ROLLBACK_FAILED ROLLBACK_IN_PROGRESS UPDATE_COMPLETE UPDATE_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_IN_PROGRESS UPDATE_ROLLBACK_COMPLETE UPDATE_ROLLBACK_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_ROLLBACK_FAILED UPDATE_ROLLBACK_IN_PROGRESS DELETE_FAILED \
          --query "StackSummaries[].StackName" \
          --output text | tr '\t' '\n' | grep -i "$stack_prefix" || true
      }

      # Function to check if any stacks are being deleted
      any_deleting() {
        local region=$1
        local stack_prefix="$STACK_PREFIX"
        local deleting_stacks=$(aws cloudformation list-stacks \
          --region $region \
          --profile default \
          --stack-status-filter DELETE_IN_PROGRESS \
          --query "StackSummaries[].StackName" \
          --output text | tr '\t' '\n' | grep -i "$stack_prefix" || true)
        if [ -z "$deleting_stacks" ]; then
          return 1
        else
          echo "Stacks currently being deleted in $region: $deleting_stacks"
          return 0
        fi
      }

      # Continue monitoring for up to 50 more minutes
      max_minutes=50
      start_time=$(date +%s)

      for region in "us-east-1" "$DEPLOY_REGION"; do
        # Skip duplicate if both regions are the same
        if [ "$region" == "us-east-1" ] && [ "$DEPLOY_REGION" == "us-east-1" ]; then
          if [ "$region" == "$DEPLOY_REGION" ]; then
            continue
          fi
        fi

        echo "Monitoring cleanup in region: $region"

        while true; do
          current_time=$(date +%s)
          elapsed_minutes=$(( (current_time - start_time) / 60 ))

          if [ $elapsed_minutes -ge $max_minutes ]; then
            echo "Reached ${max_minutes}-minute monitoring limit"
            stacks=$(list_stacks "$region")
            if [ -z "$stacks" ]; then
              echo "cleanup_status=complete" > cleanup_status.txt
              echo "All cleanup complete!"
              break 2
            else
              echo "cleanup_status=failed" > cleanup_status.txt
              echo "ERROR: Cleanup did not complete within allocated time"
              echo "Remaining stacks: $stacks"
              exit 1
            fi
          fi

          stacks=$(list_stacks "$region")
          if [ -z "$stacks" ]; then
            echo "No more stacks in $region. Moving to next region."
            break
          fi

          echo "Found stacks in $region: $stacks"

          if any_deleting "$region"; then
            echo "Deletions in progress. Waiting..."
          else
            # Try to delete remaining stacks
            for stack in $stacks; do
              echo "Attempting to delete stack: $stack"
              stack_status=$(aws cloudformation describe-stacks --stack-name "$stack" --region "$region" --profile default --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "STACK_NOT_FOUND")
              if [ "$stack_status" == "DELETE_FAILED" ]; then
                resources=$(aws cloudformation list-stack-resources --stack-name "$stack" --region "$region" --profile default --query "StackResourceSummaries[?ResourceStatus=='DELETE_FAILED'].LogicalResourceId" --output text || true)
                if [ -n "$resources" ]; then
                  aws cloudformation delete-stack \
                    --region $region \
                    --profile default \
                    --stack-name $stack \
                    --retain-resources $resources || true
                else
                  aws cloudformation delete-stack --region $region --profile default --stack-name $stack || true
                fi
              else
                aws cloudformation delete-stack --region $region --profile default --stack-name $stack || true
              fi
              break
            done
          fi

          sleep 60
        done
      done

      echo "cleanup_status=complete" > cleanup_status.txt
      echo "Cleanup monitoring completed!"
  artifacts:
    paths:
      - cleanup_status.txt
      - cleanup_region.txt
    expire_in: 1 day

# Job 3: Deploy CloudFormation stack
e2e_03_deploy_stack:
  stage: test
  timeout: 1h
  tags:
    - arch:amd64
    - size:large
  needs:
    - job: e2e_02_continue_cleanup
      artifacts: true
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never
  variables:
    <<: *e2e_variables
  <<: *e2e_aws_setup
  script:
    - echo "Step 3 Deploying MediaLake CloudFormation stack..."
    - cat cleanup_status.txt
    - echo "Checking for any existing MediaLake stacks..."
    - |
      # Function to list all matching stacks
      list_stacks() {
        local region=$1
        aws cloudformation list-stacks \
          --region $region \
          --profile default \
          --stack-status-filter CREATE_COMPLETE CREATE_FAILED CREATE_IN_PROGRESS REVIEW_IN_PROGRESS ROLLBACK_COMPLETE ROLLBACK_FAILED ROLLBACK_IN_PROGRESS UPDATE_COMPLETE UPDATE_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_IN_PROGRESS UPDATE_ROLLBACK_COMPLETE UPDATE_ROLLBACK_COMPLETE_CLEANUP_IN_PROGRESS UPDATE_ROLLBACK_FAILED UPDATE_ROLLBACK_IN_PROGRESS DELETE_FAILED \
          --query "StackSummaries[].StackName" \
          --output text | tr '\t' '\n' | grep -i "$STACK_PREFIX" || true
      }

      # Function to check if any stacks are being deleted
      any_deleting() {
        local region=$1
        local deleting_stacks=$(aws cloudformation list-stacks \
          --region $region \
          --profile default \
          --stack-status-filter DELETE_IN_PROGRESS \
          --query "StackSummaries[].StackName" \
          --output text | tr '\t' '\n' | grep -i "$STACK_PREFIX" || true)
        [ -n "$deleting_stacks" ]
      }

      # Check if any stacks exist
      existing_stacks=$(list_stacks "$DEPLOY_REGION")

      if [ -n "$existing_stacks" ]; then
        echo "WARNING: Found existing MediaLake stacks! Cleaning up before deployment..."
        echo "Stacks to delete: $existing_stacks"
        echo ""
        echo "Starting iterative deletion process (handles dependencies automatically)..."
        echo ""

        # Iterative deletion loop - tries to delete all stacks, retrying those blocked by dependencies
        MAX_ITERATIONS=60
        iteration=0

        while [ $iteration -lt $MAX_ITERATIONS ]; do
          iteration=$((iteration + 1))
          remaining_stacks=$(list_stacks "$DEPLOY_REGION")

          if [ -z "$remaining_stacks" ]; then
            echo ""
            echo "✓ All stacks successfully deleted!"
            break
          fi

          echo "=== Iteration $iteration/$MAX_ITERATIONS ==="
          echo "Remaining stacks: $remaining_stacks"
          echo ""

          # Check if any deletions are in progress
          if any_deleting "$DEPLOY_REGION"; then
            echo "Deletions in progress, waiting..."
            sleep 15
            continue
          fi

          # Try to delete all remaining stacks
          # CloudFormation will reject deletes for stacks with dependencies
          # Those will be retried in the next iteration after dependencies are gone
          deleted_any=false

          for stack in $remaining_stacks; do
            stack_status=$(aws cloudformation describe-stacks --stack-name "$stack" --region "$DEPLOY_REGION" --profile default --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "STACK_NOT_FOUND")

            if [ "$stack_status" == "STACK_NOT_FOUND" ]; then
              continue
            fi

            # Only try to delete stacks that aren't already deleting
            if [[ "$stack_status" == *"DELETE_IN_PROGRESS"* ]]; then
              echo "  $stack: Already deleting..."
              continue
            fi

            # Handle DELETE_FAILED state
            if [ "$stack_status" == "DELETE_FAILED" ]; then
              echo "  $stack: DELETE_FAILED - attempting with retain-resources..."
              resources=$(aws cloudformation list-stack-resources --stack-name "$stack" --region "$DEPLOY_REGION" --profile default --query "StackResourceSummaries[?ResourceStatus=='DELETE_FAILED'].LogicalResourceId" --output text || true)
              if [ -n "$resources" ]; then
                aws cloudformation delete-stack --stack-name "$stack" --region "$DEPLOY_REGION" --profile default --retain-resources $resources 2>&1 | grep -v "AlreadyExistsException" || true
              else
                aws cloudformation delete-stack --stack-name "$stack" --region "$DEPLOY_REGION" --profile default 2>&1 | grep -v "AlreadyExistsException" || true
              fi
              deleted_any=true
            else
              # Try to delete the stack
              echo "  $stack: Attempting deletion..."
              if aws cloudformation delete-stack --stack-name "$stack" --region "$DEPLOY_REGION" --profile default 2>&1 | tee /tmp/delete_output.txt; then
                deleted_any=true
              else
                # Check if it failed due to dependencies
                if grep -q "has dependent" /tmp/delete_output.txt || grep -q "cannot be deleted" /tmp/delete_output.txt; then
                  echo "    ↳ Has dependencies, will retry later"
                else
                  echo "    ↳ Delete failed, will retry"
                fi
              fi
            fi
          done

          if [ "$deleted_any" = true ]; then
            echo ""
            echo "Initiated deletions, waiting for progress..."
            sleep 15
          else
            echo ""
            echo "No deletions initiated this iteration. Checking if stacks are stuck..."
            sleep 5
          fi

          # Safety check - if we've tried many times with no progress, fail
          if [ $iteration -ge 40 ] && [ -n "$(list_stacks "$DEPLOY_REGION")" ]; then
            echo ""
            echo "ERROR: Stack deletion not progressing after $iteration iterations"
            echo "Remaining stacks:"
            for stack in $(list_stacks "$DEPLOY_REGION"); do
              status=$(aws cloudformation describe-stacks --stack-name "$stack" --region "$DEPLOY_REGION" --profile default --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "GONE")
              echo "  - $stack: $status"
            done
            exit 1
          fi
        done

        if [ $iteration -ge $MAX_ITERATIONS ]; then
          echo ""
          echo "ERROR: Stack deletion timed out after $MAX_ITERATIONS iterations"
          echo "Remaining stacks: $(list_stacks "$DEPLOY_REGION")"
          exit 1
        fi
      else
        echo "✓ No existing MediaLake stacks found. Proceeding with fresh deployment."
      fi

      echo ""
      echo "Pre-deployment cleanup complete!"
      echo ""
    - export BUCKET_UUID=$(python3 -c "import uuid; print(str(uuid.uuid4())[:8])")
    - export S3_BUCKET_NAME="medialake-deploy-${BUCKET_UUID}-${CI_COMMIT_SHORT_SHA}"
    - echo "Creating S3 bucket $S3_BUCKET_NAME..."
    - aws s3 mb s3://$S3_BUCKET_NAME --profile default --region $DEPLOY_REGION
    - aws s3 ls s3://$S3_BUCKET_NAME/ --profile default --region $DEPLOY_REGION
    - aws s3 cp medialake.template s3://$S3_BUCKET_NAME/medialake.template --profile default --region $DEPLOY_REGION
    - echo "Creating zip file of repository..."
    - zip -r $ZIP_FILE_NAME . -x "*.git*" "*.venv*" "*__pycache__*" "*.pyc" "*node_modules*" "*.DS_Store*"
    - ls -la $ZIP_FILE_NAME
    - echo "Uploading zip file to S3 bucket..."
    - aws s3 cp $ZIP_FILE_NAME s3://$S3_BUCKET_NAME/$ZIP_FILE_NAME --profile default --region $DEPLOY_REGION
    - echo "Generating pre-signed URL for zip file..."
    - PRESIGNED_URL=$(aws s3 presign s3://$S3_BUCKET_NAME/$ZIP_FILE_NAME --expires-in 3600 --profile default --region $DEPLOY_REGION)
    - echo "Pre-signed URL generated successfully"
    - echo "Deploying CloudFormation stack $STACK_NAME..."
    - |
      aws cloudformation create-stack \
        --stack-name $STACK_NAME \
        --template-body file://medialake.template \
        --parameters \
          ParameterKey=SourceType,ParameterValue="S3PresignedURL" \
          ParameterKey=S3PresignedURL,ParameterValue="$PRESIGNED_URL" \
          ParameterKey=InitialUserFirstName,ParameterValue="Media" \
          ParameterKey=InitialUserLastName,ParameterValue="Lake" \
          ParameterKey=InitialUserEmail,ParameterValue="medialake+deploy@amazon.com" \
          ParameterKey=MediaLakeEnvironmentName,ParameterValue="$ENVIRONMENT_NAME" \
          ParameterKey=OpenSearchDeploymentSize,ParameterValue="$DEPLOYMENT_SIZE" \
        --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
        --region $DEPLOY_REGION \
        --profile default
    - echo "CloudFormation stack deployment initiated successfully"
    - echo "Saving deployment information for next jobs..."
    - echo "$STACK_NAME" > stack_name.txt
    - echo "$S3_BUCKET_NAME" > s3_bucket_name.txt
    - echo "$DEPLOY_REGION" > deploy_region.txt
  artifacts:
    paths:
      - stack_name.txt
      - s3_bucket_name.txt
      - deploy_region.txt
    expire_in: 1 day

# Job 4: Monitor CodePipeline deployment (first 50 minutes)
e2e_04_monitor_deployment:
  stage: test
  timeout: 1h
  tags:
    - arch:amd64
    - size:large
  needs:
    - job: e2e_03_deploy_stack
      artifacts: true
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never
  variables:
    <<: *e2e_variables
  <<: *e2e_aws_setup
  script:
    - echo "Step 3 Monitoring CodePipeline deployment..."
    - export STACK_NAME=$(cat stack_name.txt)
    - export S3_BUCKET_NAME=$(cat s3_bucket_name.txt)
    - export DEPLOY_REGION=$(cat deploy_region.txt)
    - echo "Stack $STACK_NAME"
    - echo "Region $DEPLOY_REGION"
    - |
      echo "Waiting for CodePipeline to be created by CloudFormation..."
      sleep 120

      # Check for pipeline existence
      PIPELINE_NAME=""
      for pipeline_candidate in "MediaLakeCDKPipeline" "CDKDeploymentPipeline"; do
        if aws codepipeline get-pipeline --name "$pipeline_candidate" --profile default --region $DEPLOY_REGION >/dev/null 2>&1; then
          PIPELINE_NAME="$pipeline_candidate"
          echo "Found pipeline $PIPELINE_NAME"
          break
        fi
      done

      if [ -z "$PIPELINE_NAME" ]; then
        echo "Warning No CodePipeline found after CloudFormation deployment"
        echo "Pipeline may still be creating. Will retry in next job."
        echo "pipeline_not_found=true" > pipeline_status.txt
      else
        echo "Monitoring CodePipeline execution $PIPELINE_NAME"
        echo "This job will monitor for up to 50 minutes..."

        # Monitor pipeline with timeout (50 minutes max for this job)
        MAX_WAIT_TIME=3000  # 50 minutes
        ELAPSED_TIME=0
        CHECK_INTERVAL=15

        while [ $ELAPSED_TIME -lt $MAX_WAIT_TIME ]; do
          ELAPSED_MINUTES=$((ELAPSED_TIME / 60))

          EXECUTION_STATUS=$(aws codepipeline list-pipeline-executions \
            --pipeline-name "$PIPELINE_NAME" \
            --profile default \
            --region $DEPLOY_REGION \
            --max-items 1 \
            --query "pipelineExecutionSummaries[0].status" \
            --output text 2>/dev/null | tr -d '\n\r' | sed 's/None//g' | xargs)

          if [ -z "$EXECUTION_STATUS" ] || [ "$EXECUTION_STATUS" == "null" ]; then
            echo "[$ELAPSED_MINUTES m] Waiting for pipeline execution to start..."
          else
            echo "[$ELAPSED_MINUTES m] Pipeline Status $EXECUTION_STATUS"

            case "$EXECUTION_STATUS" in
              "Succeeded")
                echo "Pipeline completed successfully!"
                echo "pipeline_status=Succeeded" > pipeline_status.txt
                break
                ;;
              "Failed"|"Stopped")
                echo "Pipeline failed or was stopped!"
                echo "pipeline_status=Failed" > pipeline_status.txt
                exit 1
                ;;
              "InProgress"|"IN_PROGRESS"|"In_Progress")
                # Continue monitoring
                ;;
              *)
                if [[ "$EXECUTION_STATUS" == *"FAILED"* ]] || [[ "$EXECUTION_STATUS" == *"Failed"* ]]; then
                  echo "Pipeline failed!"
                  echo "pipeline_status=Failed" > pipeline_status.txt
                  exit 1
                fi
                ;;
            esac
          fi

          sleep $CHECK_INTERVAL
          ELAPSED_TIME=$((ELAPSED_TIME + CHECK_INTERVAL))
        done

        if [ $ELAPSED_TIME -ge $MAX_WAIT_TIME ]; then
          echo "Monitoring reached 50-minute limit for this job"
          echo "Pipeline may still be running - will continue in next job"
          echo "pipeline_status=InProgress" > pipeline_status.txt
        fi
      fi
    - echo "$(cat pipeline_status.txt)"
  artifacts:
    paths:
      - stack_name.txt
      - s3_bucket_name.txt
      - deploy_region.txt
      - pipeline_status.txt
    expire_in: 1 day

# Job 5: Continue monitoring if needed (second 50 minutes, gets fresh credentials)
e2e_05_continue_monitoring:
  stage: test
  timeout: 1h
  tags:
    - arch:amd64
    - size:large
  needs:
    - job: e2e_04_monitor_deployment
      artifacts: true
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never
  variables:
    <<: *e2e_variables
  <<: *e2e_aws_setup
  script:
    - echo "Step 4 Continue monitoring if pipeline still in progress..."
    - export STACK_NAME=$(cat stack_name.txt)
    - export DEPLOY_REGION=$(cat deploy_region.txt)
    - |
      if [ -f pipeline_status.txt ]; then
        STATUS=$(cat pipeline_status.txt | cut -d'=' -f2)
        if [ "$STATUS" == "Succeeded" ]; then
          echo "Pipeline already completed successfully!"
          exit 0
        elif [ "$STATUS" == "Failed" ]; then
          echo "Pipeline failed in previous job"
          exit 1
        fi
      fi

      echo "Continuing pipeline monitoring with fresh credentials..."

      # Find pipeline
      PIPELINE_NAME=""
      for pipeline_candidate in "MediaLakeCDKPipeline" "CDKDeploymentPipeline"; do
        if aws codepipeline get-pipeline --name "$pipeline_candidate" --profile default --region $DEPLOY_REGION >/dev/null 2>&1; then
          PIPELINE_NAME="$pipeline_candidate"
          break
        fi
      done

      if [ -z "$PIPELINE_NAME" ]; then
        echo "Error Pipeline not found!"
        exit 1
      fi

      # Monitor for another 50 minutes
      MAX_WAIT_TIME=3000
      ELAPSED_TIME=0
      CHECK_INTERVAL=15

      while [ $ELAPSED_TIME -lt $MAX_WAIT_TIME ]; do
        ELAPSED_MINUTES=$((ELAPSED_TIME / 60))

        EXECUTION_STATUS=$(aws codepipeline list-pipeline-executions \
          --pipeline-name "$PIPELINE_NAME" \
          --profile default \
          --region $DEPLOY_REGION \
          --max-items 1 \
          --query "pipelineExecutionSummaries[0].status" \
          --output text 2>/dev/null | tr -d '\n\r' | sed 's/None//g' | xargs)

        echo "[$ELAPSED_MINUTES m] Pipeline Status $EXECUTION_STATUS"

        case "$EXECUTION_STATUS" in
          "Succeeded")
            echo "Pipeline completed successfully!"
            echo "pipeline_status=Succeeded" > pipeline_status.txt
            break
            ;;
          "Failed"|"Stopped")
            echo "Pipeline failed!"
            exit 1
            ;;
        esac

        sleep $CHECK_INTERVAL
        ELAPSED_TIME=$((ELAPSED_TIME + CHECK_INTERVAL))
      done
  artifacts:
    paths:
      - stack_name.txt
      - s3_bucket_name.txt
      - deploy_region.txt
      - pipeline_status.txt
    expire_in: 1 day

# Job 6: Run Playwright E2E tests
e2e_06_run_tests:
  stage: test
  timeout: 1h
  tags:
    - arch:amd64
    - size:large
  needs:
    - job: e2e_05_continue_monitoring
      artifacts: true
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: on_success
    - when: never
  variables:
    <<: *e2e_variables
  before_script:
    - echo "============================================"
    - echo "Job Start Time $(date '+%Y-%m-%d %H:%M:%S %Z')"
    - echo "============================================"
    # Install required dependencies
    - yum update -y
    - yum install -y python3 python3-pip unzip which findutils
    # Install Playwright browser dependencies for Amazon Linux
    - echo "Installing Playwright browser dependencies..."
    - yum install -y atk at-spi2-atk cups-libs libdrm libxcb libxkbcommon at-spi2-core libX11 libXcomposite libXdamage libXext libXfixes libXrandr mesa-libgbm pango cairo alsa-lib libXScrnSaver gtk3 nss nspr
    # Install Node.js for Playwright
    - curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
    - yum install -y nodejs
    - node --version
    - npm --version
    # Install AWS CLI
    - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    - unzip awscliv2.zip
    - ./aws/install
    - aws --version
    # Configure AWS credentials for test execution
    - cat $AWS_SHARED_CREDENTIALS_FILE
    - aws sts get-caller-identity --profile default
    - echo "AWS identity verified for testing"
  script:
    - echo "Step 5 Running Playwright E2E tests..."
    - export STACK_NAME=$(cat stack_name.txt)
    - export DEPLOY_REGION=$(cat deploy_region.txt)
    - echo "Extracting CloudFront URL for E2E tests..."
    - |
      # Use the environment name from the deployment
      MEDIALAKE_ENV=${ENVIRONMENT_NAME:-e2e}

      echo "Looking for CloudFront URL for environment: $MEDIALAKE_ENV"
      echo "Stack name: $STACK_NAME"
      echo "Region: $DEPLOY_REGION"
      echo ""

      # Try 1: Extract CloudFront domain from SSM Parameter
      echo "Attempt 1: Checking SSM parameter /medialake/${MEDIALAKE_ENV}/cloudfront-distribution-domain..."
      CLOUDFRONT_DOMAIN=$(aws ssm get-parameter \
        --name "/medialake/${MEDIALAKE_ENV}/cloudfront-distribution-domain" \
        --region $DEPLOY_REGION \
        --profile default \
        --query "Parameter.Value" \
        --output text 2>/dev/null || echo "")

      if [ -n "$CLOUDFRONT_DOMAIN" ] && [ "$CLOUDFRONT_DOMAIN" != "None" ]; then
        echo "✓ Found CloudFront domain in SSM: $CLOUDFRONT_DOMAIN"
      else
        echo "✗ SSM parameter not found or empty"

        # Try 2: Look for CloudFront distribution from stack outputs
        echo ""
        echo "Attempt 2: Checking CloudFormation stack outputs..."
        CLOUDFRONT_DOMAIN=$(aws cloudformation describe-stacks \
          --stack-name $STACK_NAME \
          --region $DEPLOY_REGION \
          --profile default \
          --query "Stacks[0].Outputs[?contains(OutputKey,'CloudFront')||contains(OutputKey,'Distribution')].OutputValue|[0]" \
          --output text 2>/dev/null || echo "")

        if [ -n "$CLOUDFRONT_DOMAIN" ] && [ "$CLOUDFRONT_DOMAIN" != "None" ]; then
          echo "✓ Found CloudFront domain in stack outputs: $CLOUDFRONT_DOMAIN"
        else
          echo "✗ Stack outputs did not contain CloudFront domain"

          # Try 3: Look through CloudFormation exports
          echo ""
          echo "Attempt 3: Checking CloudFormation exports..."
          echo "All exports in region:"
          aws cloudformation list-exports --region $DEPLOY_REGION --profile default --query "Exports[].{Name:Name,Value:Value}" --output table

          CLOUDFRONT_DOMAIN=$(aws cloudformation list-exports \
            --region $DEPLOY_REGION \
            --profile default \
            --query "Exports[?contains(Name,'CloudFront')&&contains(Name,'Domain')].Value|[0]" \
            --output text 2>/dev/null || echo "")

          if [ -n "$CLOUDFRONT_DOMAIN" ] && [ "$CLOUDFRONT_DOMAIN" != "None" ]; then
            echo "✓ Found CloudFront domain in exports: $CLOUDFRONT_DOMAIN"
          else
            echo "✗ No CloudFront domain found in exports"
          fi
        fi
      fi

      echo ""
      echo "================================================"
      echo "E2E Test Configuration:"
      echo "  CloudFront Domain: $CLOUDFRONT_DOMAIN"
      echo "  AWS Region: $DEPLOY_REGION"
      echo "  Stack Name: $STACK_NAME"
      echo "  Environment: $MEDIALAKE_ENV"
      echo "================================================"
      echo "Note: Playwright will dynamically discover Cognito"
      echo "      pools and other AWS resources using AWS SDK"
      echo "================================================"

      # Validate CloudFront URL
      if [ -z "$CLOUDFRONT_DOMAIN" ] || [ "$CLOUDFRONT_DOMAIN" == "None" ]; then
        echo ""
        echo "ERROR: CloudFront domain not found after all attempts!"
        echo "Please check that the deployment completed successfully."
        exit 1
      fi

      # Export minimal configuration for Playwright
      # Playwright tests will use AWS SDK to discover Cognito and other resources
      export PLAYWRIGHT_BASE_URL="https://$CLOUDFRONT_DOMAIN"
      export AWS_REGION="$DEPLOY_REGION"
      export AWS_DEFAULT_REGION="$DEPLOY_REGION"
      export STACK_NAME="$STACK_NAME"
      export MEDIALAKE_ENV="$MEDIALAKE_ENV"
    - cd medialake_user_interface
    - echo "Installing Node.js dependencies..."
    - npm install
    - echo "Installing Playwright browsers (skipping system dependency check - already installed manually)..."
    - export PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS=true
    - npx playwright install chromium
    - echo "Playwright browser installation complete"
    - echo "Using CI-specific Playwright configuration (excludes old local dev tests)"
    - |
      # Set environment variables for Playwright tests
      export CI=true
      export AWS_REGION=$DEPLOY_REGION
      export AWS_DEFAULT_REGION=$DEPLOY_REGION

      # Make AWS credentials available to Playwright (for dynamic resource discovery)
      export AWS_ACCESS_KEY_ID=$(grep aws_access_key_id $AWS_SHARED_CREDENTIALS_FILE | cut -d'=' -f2 | tr -d ' ')
      export AWS_SECRET_ACCESS_KEY=$(grep aws_secret_access_key $AWS_SHARED_CREDENTIALS_FILE | cut -d'=' -f2 | tr -d ' ')
      export AWS_SESSION_TOKEN=$(grep aws_session_token $AWS_SHARED_CREDENTIALS_FILE | cut -d'=' -f2 | tr -d ' ')

      echo "Environment prepared for Playwright tests with AWS SDK access"

      cat > playwright.ci.config.ts << 'EOF'
      import { defineConfig } from '@playwright/test';
      import baseConfig from './playwright.config';

      export default defineConfig({
        ...baseConfig,
        use: {
          ...baseConfig.use,
          baseURL: process.env.PLAYWRIGHT_BASE_URL || 'http://localhost:5173',
        },
        webServer: undefined,
        // Increase timeout for tests that need to discover AWS resources
        timeout: 60000,
      });
      EOF

      echo "Running Playwright E2E tests with CI configuration..."
      echo "ℹ Note: Old local dev tests (auth/login.spec.ts) excluded via config"
      npx playwright test \
        --config=playwright.ci.config.ts \
        --project=chromium \
        || TEST_EXIT_CODE=$?

      if [ -n "$TEST_EXIT_CODE" ] && [ "$TEST_EXIT_CODE" -ne "0" ]; then
        echo "Some Playwright tests failed (exit code $TEST_EXIT_CODE)"
        exit $TEST_EXIT_CODE
      else
        echo "All Playwright tests passed!"
      fi
  artifacts:
    when: always
    paths:
      - medialake_user_interface/playwright-report/
      - medialake_user_interface/test-results/
      - stack_name.txt
      - s3_bucket_name.txt
      - deploy_region.txt
    reports:
      junit: medialake_user_interface/test-results/junit.xml
    expire_in: 30 days

# Job 7: Cleanup resources
e2e_07_cleanup:
  stage: test
  timeout: 30m
  tags:
    - arch:amd64
    - size:large
  needs:
    - job: e2e_06_run_tests
      artifacts: true
  when: always # Always run cleanup, even if tests fail
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "stable"
      when: always
    - when: never
  variables:
    <<: *e2e_variables
  <<: *e2e_aws_setup
  script:
    - echo "Step 6 Cleaning up deployment resources..."
    - export S3_BUCKET_NAME=$(cat s3_bucket_name.txt 2>/dev/null || echo "")
    - export DEPLOY_REGION=$(cat deploy_region.txt 2>/dev/null || echo "$US_WEST_2_AWS_REGION")
    - |
      if [ -n "$S3_BUCKET_NAME" ]; then
        echo "Cleaning up S3 bucket $S3_BUCKET_NAME..."
        if aws s3 ls "s3://$S3_BUCKET_NAME" --profile default --region $DEPLOY_REGION >/dev/null 2>&1; then
          aws s3 rm "s3://$S3_BUCKET_NAME" --recursive --profile default --region $DEPLOY_REGION 2>&1 || echo "Warning Failed to delete some objects"
          aws s3 rb "s3://$S3_BUCKET_NAME" --profile default --region $DEPLOY_REGION 2>&1 || echo "Warning Bucket deletion failed"
          echo "S3 bucket cleanup completed"
        else
          echo "S3 bucket not found or already deleted"
        fi
      else
        echo "No S3 bucket to clean up"
      fi
    - echo "Cleanup completed!"
